<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresos y Egresos - García & Asociados</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1a237e; --grad1: #2c3e50; --grad2: #34495e;
            --light: #f8f9fa; --border: #dee2e6;
            --green: #28a745; --red: #dc3545; --blue: #007bff; --purple: #6366f1;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; margin:10px; background:linear-gradient(135deg,var(--grad1),var(--grad2)); min-height:100vh; }
        .container { max-width:1350px; margin:0 auto; background:#fff; padding:20px; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.1); }
        .header { text-align:center; margin-bottom:20px; }
        .header h1 { color:var(--primary); font-size:2.2em; margin-bottom:5px; }
        .header h2 { color:#666; font-size:1.1em; font-weight:normal; }

        /* TARJETAS ANUALES */
        .annual-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:15px; margin:20px 0; }
        .a-card { background:var(--light); border-radius:10px; padding:15px; text-align:center; border-left:5px solid var(--primary); box-shadow:0 2px 8px rgba(0,0,0,.06); transition:transform .2s; }
        .a-card:hover { transform:translateY(-3px); }
        .a-card h4 { font-size:.72em; text-transform:uppercase; color:#666; margin-bottom:8px; }
        .a-card .val { font-size:1.35em; font-weight:700; }
        .a-card.g { border-left-color:var(--green); } .a-card.g .val { color:var(--green); }
        .a-card.r { border-left-color:var(--red); } .a-card.r .val { color:var(--red); }
        .a-card.b { border-left-color:var(--blue); } .a-card.b .val { color:var(--blue); }
        .a-card.p { border-left-color:var(--purple); } .a-card.p .val { color:var(--purple); }
        .a-card.warn { background:#fff5f5; border-left-color:var(--red); }

        /* GRÁFICO */
        .chart-box { background:var(--light); border-radius:10px; padding:20px; margin:20px 0; }
        .chart-box h3 { color:var(--primary); margin-bottom:15px; font-size:.95em; text-transform:uppercase; }
        .chart-wrap { position:relative; height:220px; }

        /* BOTONES */
        .controls { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin:20px 0; }
        .btn { background:linear-gradient(135deg,var(--primary),#0d47a1); color:#fff; padding:10px 16px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:bold; transition:all .3s; }
        .btn:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(26,35,126,.3); }
        .btn-success { background:linear-gradient(135deg,#2ecc71,#27ae60); }
        .btn-warning { background:linear-gradient(135deg,#f39c12,#e67e22); }
        .btn-info { background:linear-gradient(135deg,#3498db,#2980b9); }
        .btn-danger { background:linear-gradient(135deg,#e74c3c,#c0392b); }
        .btn-sm { padding:6px 12px; font-size:12px; }

        /* FILTROS */
        .filter-bar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; background:#f0f4ff; padding:12px 16px; border-radius:8px; margin-bottom:15px; }
        .filter-bar label { font-size:12px; font-weight:600; color:#444; }
        .filter-bar select, .filter-bar input { padding:6px 10px; border:1px solid #ccc; border-radius:5px; font-size:13px; }

        /* SYNC */
        .sync-sec { text-align:center; margin:20px 0; border-top:1px solid #ddd; padding-top:20px; border-bottom:1px solid #ddd; padding-bottom:20px; }
        .sync-sec h3 { color:#444; margin-bottom:15px; font-size:1em; }
        #firebaseStatus { margin-top:10px; padding:8px 16px; border-radius:8px; font-size:.88em; display:inline-block; background:#fff3cd; color:#856404; border:1px solid #ffc107; }
        .data-status { padding:10px; border-radius:8px; margin:8px 0; text-align:center; font-size:.95em; font-weight:bold; display:none; }
        .status-success { background:#d1e7dd; border:1px solid #0f5132; color:#0f5132; }
        .status-warning { background:#fff3cd; border:1px solid #664d03; color:#664d03; }

        /* TABLA */
        .table-container { overflow-x:auto; margin-top:15px; border-radius:8px; box-shadow:0 4px 8px rgba(0,0,0,.1); }
        table { width:100%; border-collapse:collapse; min-width:1050px; background:#fff; }
        th { background:linear-gradient(135deg,var(--primary),#0d47a1); color:#fff; padding:10px 8px; text-align:center; border:1px solid #0d47a1; font-size:12px; }
        td { padding:6px 5px; border:1px solid #ddd; text-align:center; vertical-align:middle; }
        tbody tr:nth-child(even) { background:#f9f9f9; }
        tbody tr:hover { background:#f0f8ff; }
        .input-field, .select-field { width:100%; padding:5px 4px; border:1px solid #ccc; border-radius:4px; font-size:12px; }
        .cat-i { background:#e8f5e8!important; } .cat-e { background:#ffebee!important; }
        .del-btn { background:none; border:none; cursor:pointer; font-size:1.1em; color:#c0392b; }
        .del-btn:hover { color:#e74c3c; transform:scale(1.2); }

        /* MES */
        .month-sec { margin-bottom:25px; }
        .month-title { font-size:1.4em; color:var(--primary); padding-bottom:10px; border-bottom:2px solid var(--primary); margin-bottom:15px; display:flex; align-items:center; gap:10px; }
        .badge { font-size:.55em; padding:4px 10px; border-radius:20px; font-weight:700; }
        .badge.pos { background:#d1fae5; color:#065f46; }
        .badge.neg { background:#fee2e2; color:#991b1b; }

        /* RESUMEN BOX */
        .sum-box { background:linear-gradient(135deg,var(--light),#e9ecef); border:1px solid var(--border); border-radius:8px; padding:15px; margin:15px 0; display:flex; justify-content:space-around; flex-wrap:wrap; gap:15px; }
        .sum-box.neg { background:linear-gradient(135deg,#fff5f5,#fee2e2); border-color:#fca5a5; }
        .sum-item { text-align:center; }
        .sum-label { font-size:11px; color:#6c757d; text-transform:uppercase; font-weight:bold; }
        .sum-val { font-size:18px; font-weight:bold; margin-top:5px; }
        .si { color:var(--green); } .se { color:var(--red); } .sb { color:var(--blue); } .sb.neg { color:var(--red); }

        /* ARCHIVO */
        #archive-container h2 { font-size:1.2em; color:#444; margin-top:40px; border-bottom:1px solid #ccc; padding-bottom:8px; }
        .arch-item { border:1px solid var(--border); border-radius:8px; margin-bottom:10px; overflow:hidden; }
        .arch-item summary { display:flex; justify-content:space-between; align-items:center; padding:13px 15px; background:var(--light); cursor:pointer; font-size:1em; font-weight:bold; list-style:none; }
        .arch-item summary::before { content:'▶'; margin-right:10px; font-size:.8em; transition:transform .2s; }
        .arch-item[open]>summary::before { transform:rotate(90deg); }
        .arch-item.neg-month>summary { background:#fff5f5; }
        .arch-totals { display:flex; gap:15px; font-size:.85em; flex-wrap:wrap; }
        .arch-totals span { font-weight:normal; }
        .ti { color:var(--green); } .te { color:var(--red); } .tb { color:var(--blue); font-weight:700; } .tb.neg { color:var(--red); font-weight:700; }
        .arch-controls { padding:8px 15px; background:#fdfdfd; display:flex; justify-content:flex-end; gap:8px; }

        /* MODAL */
        .modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,.5); backdrop-filter:blur(5px); }
        .modal-content { background:#fff; margin:10% auto; padding:20px; border-radius:8px; width:80%; max-width:600px; box-shadow:0 8px 32px rgba(0,0,0,.3); }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid #ddd; }
        .modal-header h3 { margin:0; color:var(--primary); }
        .close { color:#aaa; font-size:28px; font-weight:bold; cursor:pointer; }
        .obs-textarea { width:100%; height:120px; padding:10px; border:1px solid #ccc; border-radius:4px; font-family:Arial,sans-serif; font-size:14px; resize:vertical; box-sizing:border-box; }
        .modal-btns { display:flex; justify-content:flex-end; gap:10px; margin-top:15px; flex-wrap:wrap; }
        .mbtn { padding:10px 16px; border:none; border-radius:4px; cursor:pointer; font-size:14px; font-weight:bold; }
        .mbtn-save { background:#27ae60; color:#fff; } .mbtn-clear { background:#f39c12; color:#fff; } .mbtn-cancel { background:#95a5a6; color:#fff; }
        .obs-btn { background:#3498db; color:#fff; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:11px; font-weight:bold; }
        .obs-btn:hover { background:#2980b9; } .obs-btn.has { background:#27ae60; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>GARCÍA & ASOCIADOS</h1>
        <h2>Planilla de Ingresos y Egresos</h2>
    </div>

    <div id="annualRow" class="annual-row"></div>

    <div class="chart-box">
        <h3>📊 Evolución Mensual <span id="chartYear"></span></h3>
        <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
    </div>

    <div class="controls">
        <button class="btn" id="addRowBtn" type="button">➕ Nueva Fila</button>
        <button class="btn btn-danger" id="addMonthBtn" type="button">📅 Agregar Mes</button>
        <button class="btn btn-info" id="sortBtn" type="button">🔤 Ordenar</button>
        <button class="btn" id="syncAbonosBtn" type="button" style="background:linear-gradient(135deg,#6a1b9a,#4a148c);">🔄 Sincronizar Abonos</button>
        <button class="btn btn-success" id="exportExcelBtn" type="button">📊 Exportar Excel</button>
        <button class="btn btn-info" id="exportJSONBtn" type="button">💾 Backup JSON</button>
        <button class="btn btn-warning" id="importJSONBtn" type="button">📂 Importar JSON</button>
    </div>
    <input type="file" id="jsonFileInput" accept=".json" style="display:none">

    <div class="sync-sec">
        <h3>☁️ Sincronización</h3>
        <button id="connectDriveBtn" class="btn" type="button">🔗 Conectar a Drive</button>
        <button id="saveToDriveBtn" class="btn btn-success" style="display:none" type="button">📤 Guardar en Drive</button>
        <button id="loadFromDriveBtn" class="btn btn-warning" style="display:none" type="button">📥 Cargar de Drive</button>
        <br><div id="firebaseStatus">🔥 Firebase: Conectando...</div>
        <div id="driveStatus" class="data-status"></div>
    </div>

    <div class="filter-bar">
        <label>🔍 Buscar:</label>
        <input type="text" id="filterSearch" placeholder="Descripción..." oninput="renderApp()">
        <label>Categoría:</label>
        <select id="filterCat" onchange="renderApp()">
            <option value="">Todas</option>
            <option value="ingreso">Ingresos</option>
            <option value="egreso">Egresos</option>
        </select>
        <label>Quién:</label>
        <select id="filterQuien" onchange="renderApp()">
            <option value="">Todos</option>
            <option value="CAMILA">CAMILA</option>
            <option value="SEBA">SEBA</option>
            <option value="ESTUDIO">ESTUDIO</option>
            <option value="CLIENTE">CLIENTE</option>
        </select>
        <button class="btn btn-sm" onclick="clearFilters()">✖ Limpiar</button>
    </div>

    <div class="month-sec" id="current-month-container"></div>
    <div id="archive-container"></div>
</div>

<div id="obsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Observaciones</h3>
            <span class="close" id="closeModalBtn">&times;</span>
        </div>
        <textarea id="obsTextarea" class="obs-textarea" placeholder="Observaciones..."></textarea>
        <div class="modal-btns">
            <button class="mbtn mbtn-clear" id="clearObsBtn" type="button">Borrar</button>
            <button class="mbtn mbtn-cancel" id="cancelObsBtn" type="button">Cancelar</button>
            <button class="mbtn mbtn-save" id="saveObsBtn" type="button">Guardar</button>
        </div>
    </div>
</div>

<script>
let allData = {};
let chartInstance = null;

// ====== FIREBASE ======
const FB_CONFIG = {
    apiKey:"AIzaSyBUdoBFw1R1_LKEB6VGitg1zuB78g-eo9k",
    authDomain:"garcia-asociados.firebaseapp.com",
    databaseURL:"https://garcia-asociados-default-rtdb.firebaseio.com",
    projectId:"garcia-asociados",
    storageBucket:"garcia-asociados.firebasestorage.app",
    messagingSenderId:"579231843924",
    appId:"1:579231843924:web:73d02f5aacd7ecf27a4fc1"
};
let fbRef, skipNext = false;

function initFirebase() {
    if (typeof firebase === 'undefined') { setTimeout(initFirebase, 600); return; }
    try {
        firebase.initializeApp(FB_CONFIG);
        const db = firebase.database();
        fbRef = db.ref('planilla_egresos');
        fbRef.on('value', snap => {
            if (skipNext) { skipNext = false; return; }
            const d = snap.val();
            if (d && typeof d === 'object' && !Array.isArray(d)) {
                allData = d;
                localStorage.setItem('ingresosEgresosData', JSON.stringify(allData));
                renderApp(); setFBStatus('✅ Sincronizado en tiempo real','ok');
            } else if (d === null) {
                const loc = localStorage.getItem('ingresosEgresosData');
                if (loc) { allData = JSON.parse(loc); saveToFB(); setFBStatus('✅ Datos locales subidos','ok'); }
                else setFBStatus('✅ Listo (vacío)','ok');
            }
        }, () => setFBStatus('❌ Error de conexión','error'));
        db.ref('.info/connected').on('value', s => setFBStatus(s.val() ? '✅ Conectado en tiempo real' : '⚠️ Sin conexión (local)', s.val() ? 'ok' : 'warn'));
    } catch(e) { setFBStatus('❌ Error al iniciar','error'); }
}

function setFBStatus(msg, t) {
    const el = document.getElementById('firebaseStatus'); if (!el) return;
    el.textContent = '🔥 Firebase: ' + msg;
    const s = {ok:['#d4edda','#155724','#c3e6cb'],warn:['#fff3cd','#856404','#ffc107'],error:['#f8d7da','#721c24','#f5c6cb']}[t]||[,'#856404','#ffc107'];
    el.style.background=s[0]; el.style.color=s[1]; el.style.borderColor=s[2];
}

function saveToFB() {
    if (!fbRef) return;
    skipNext = true;
    fbRef.set(allData).catch(() => { skipNext = false; });
}

function saveData() { localStorage.setItem('ingresosEgresosData', JSON.stringify(allData)); saveToFB(); }
window.saveData = saveData;
function loadData() { try { allData = JSON.parse(localStorage.getItem('ingresosEgresosData') || '{}'); } catch(e) { allData = {}; } }
// ====== FIN FIREBASE ======

document.addEventListener('DOMContentLoaded', () => {
    let curMK = '', obsIdx = -1, obsMK = '';
    const cats = ['ingreso','egreso'];
    const medios = ['efectivo','transferencia','cheque','tarjeta','otro'];
    const personas = ['CAMILA','SEBA','ESTUDIO','CLIENTE'];
    const tiposI = ['Honorarios Abono Mensual','Honorarios Siniestro','Regulación de Honorarios','Cobro Bonos y AP','Otro Ingreso'];
    const tiposE = ['Pago Bonos y AP','Alquiler','Servicios','Sueldos','Impuestos','Librería','Otro Egreso'];

    function init() {
        const now = new Date(new Date().toLocaleString("en-US",{timeZone:"America/Argentina/Buenos_Aires"}));
        curMK = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        loadData(); renderApp(); setupEvents(); initFirebase();
    }

    window.renderApp = function() {
        const open = new Set(Array.from(document.querySelectorAll('#archive-container .arch-item[open]')).map(e=>e.dataset.mk));
        renderCurMonth(); renderArchive(); renderAnnual(); renderChart();
        open.forEach(k => { const el=document.querySelector(`.arch-item[data-mk="${k}"]`); if(el) el.open=true; });
    };

    window.clearFilters = function() {
        document.getElementById('filterSearch').value='';
        document.getElementById('filterCat').value='';
        document.getElementById('filterQuien').value='';
        renderApp();
    };

    function filtered(txs) {
        const s=(document.getElementById('filterSearch')?.value||'').toLowerCase();
        const c=document.getElementById('filterCat')?.value||'';
        const q=document.getElementById('filterQuien')?.value||'';
        return txs.filter(t=>(!s||(t.descripcion||'').toLowerCase().includes(s))&&(!c||t.categoria===c)&&(!q||t.quien===q));
    }

    function renderCurMonth() {
        const el=document.getElementById('current-month-container');
        const txs=allData[curMK]?.transactions||[];
        const tot=calcTotals(txs); const bn=tot.balance>=0;
        el.innerHTML=`
        <div class="month-title">📅 ${fmtMK(curMK)} <span class="badge ${bn?'pos':'neg'}">Balance: ${fmt(tot.balance)}</span></div>
        <div class="sum-box ${bn?'':'neg'}">
            <div class="sum-item"><div class="sum-label">Ingresos</div><div class="sum-val si">${fmt(tot.ingresos)}</div></div>
            <div class="sum-item"><div class="sum-label">Egresos</div><div class="sum-val se">${fmt(tot.egresos)}</div></div>
            <div class="sum-item"><div class="sum-label">Balance</div><div class="sum-val sb ${bn?'':'neg'}">${fmt(tot.balance)}</div></div>
        </div>
        <div class="table-container"><table>
            <thead><tr><th style="width:105px">Fecha</th><th>Descripción</th><th style="width:145px">Tipo</th><th style="width:90px">Categoría</th><th style="width:115px">Monto</th><th style="width:105px">Medio Pago</th><th style="width:95px">Quién</th><th style="width:60px">Obs</th><th style="width:45px">❌</th></tr></thead>
            <tbody>${filtered(txs).map(r=>row(r,txs.indexOf(r),curMK)).join('')}</tbody>
        </table></div>`;
    }

    function renderArchive() {
        const el=document.getElementById('archive-container');
        const keys=Object.keys(allData).sort().reverse();
        let html='<h2>📁 Meses Archivados</h2>'; let hasAny=false;
        keys.forEach(k=>{
            if(k===curMK)return; hasAny=true;
            const txs=allData[k]?.transactions||[]; const tot=calcTotals(txs); const neg=tot.balance<0;
            html+=`<details class="arch-item ${neg?'neg-month':''}" data-mk="${k}">
                <summary>
                    <span>${neg?'⚠️ ':''}${fmtMK(k)}</span>
                    <div class="arch-totals">
                        <span class="ti">▲ ${fmt(tot.ingresos)}</span>
                        <span class="te">▼ ${fmt(tot.egresos)}</span>
                        <span class="tb ${neg?'neg':''}">${neg?'🔴':'🟢'} ${fmt(tot.balance)}</span>
                    </div>
                </summary>
                <div class="arch-controls">
                    <button class="btn btn-sm add-arch" data-mk="${k}" type="button">➕ Nueva Fila</button>
                    <button class="btn btn-sm btn-info sort-arch" data-mk="${k}" type="button">🔤 Ordenar</button>
                    <button class="btn btn-sm btn-danger del-month" data-mk="${k}" type="button">🗑️ Eliminar Mes</button>
                </div>
                <div class="table-container"><table>
                    <thead><tr><th style="width:105px">Fecha</th><th>Descripción</th><th style="width:145px">Tipo</th><th style="width:90px">Categoría</th><th style="width:115px">Monto</th><th style="width:105px">Medio Pago</th><th style="width:95px">Quién</th><th style="width:60px">Obs</th><th style="width:45px">❌</th></tr></thead>
                    <tbody>${filtered(txs).map(r=>row(r,txs.indexOf(r),k)).join('')}</tbody>
                </table></div>
            </details>`;
        });
        if(!hasAny) html+='<p style="color:#888;margin-top:10px;">No hay meses archivados.</p>';
        el.innerHTML=html;
    }

    function row(r, i, mk) {
        const cc=r.categoria==='ingreso'?'cat-i':'cat-e';
        const tOpts=(r.categoria==='ingreso'?tiposI:tiposE).map(t=>`<option value="${t}" ${t===(r.tipo||'')?'selected':''}>${t}</option>`).join('');
        const hasO=r.observaciones&&r.observaciones.trim()!=='';
        return `<tr data-i="${i}" data-mk="${mk}" class="${cc}">
            <td><input type="date" class="input-field" value="${r.fecha||''}" data-f="fecha"></td>
            <td><input type="text" class="input-field" value="${(r.descripcion||'').replace(/"/g,'&quot;')}" data-f="descripcion" placeholder="Descripción..."></td>
            <td><select class="select-field" data-f="tipo">${tOpts}</select></td>
            <td class="${cc}"><select class="select-field" data-f="categoria">${cats.map(c=>`<option value="${c}" ${c===r.categoria?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}</select></td>
            <td><input type="text" class="input-field" style="text-align:right" value="${fmt(r.monto||0,false)}" data-f="monto"></td>
            <td><select class="select-field" data-f="medioPago"><option value="">-</option>${medios.map(m=>`<option value="${m}" ${m===r.medioPago?'selected':''}>${m.charAt(0).toUpperCase()+m.slice(1)}</option>`).join('')}</select></td>
            <td><select class="select-field" data-f="quien"><option value="">-</option>${personas.map(p=>`<option value="${p}" ${p===r.quien?'selected':''}>${p}</option>`).join('')}</select></td>
            <td><button class="obs-btn ${hasO?'has':''}" data-i="${i}" data-mk="${mk}">${hasO?'📝':'+'}</button></td>
            <td><button class="del-btn" data-i="${i}" data-mk="${mk}">🗑️</button></td>
        </tr>`;
    }

    function renderAnnual() {
        const yr=new Date().getFullYear();
        document.getElementById('chartYear').textContent=yr;
        let ti=0,te=0;
        Object.keys(allData).forEach(k=>{ if(!k.startsWith(yr))return; const t=calcTotals(allData[k]?.transactions||[]); ti+=t.ingresos; te+=t.egresos; });
        const b=ti-te; const pct=ti>0?Math.round((b/ti)*100):0;
        document.getElementById('annualRow').innerHTML=`
            <div class="a-card g"><h4>💰 Ingresos ${yr}</h4><div class="val">${fmt(ti)}</div></div>
            <div class="a-card r"><h4>💸 Egresos ${yr}</h4><div class="val">${fmt(te)}</div></div>
            <div class="a-card ${b>=0?'b':'r warn'}"><h4>${b>=0?'✅':'⚠️'} Balance ${yr}</h4><div class="val">${fmt(b)}</div></div>
            <div class="a-card p"><h4>📈 Margen</h4><div class="val">${pct}%</div></div>`;
    }

    function renderChart() {
        const yr=new Date().getFullYear();
        const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        const ing=Array(12).fill(0), egr=Array(12).fill(0);
        Object.keys(allData).forEach(k=>{ if(!k.startsWith(yr))return; const m=parseInt(k.split('-')[1])-1; const t=calcTotals(allData[k]?.transactions||[]); ing[m]=t.ingresos; egr[m]=t.egresos; });
        const ctx=document.getElementById('monthlyChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance=new Chart(ctx,{type:'bar',data:{labels:meses,datasets:[
            {label:'Ingresos',data:ing,backgroundColor:'rgba(40,167,69,.7)',borderColor:'#28a745',borderWidth:1},
            {label:'Egresos',data:egr,backgroundColor:'rgba(220,53,69,.7)',borderColor:'#dc3545',borderWidth:1}
        ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top'}},scales:{y:{ticks:{callback:v=>'$'+new Intl.NumberFormat('es-AR').format(v)}}}}});
    }

    function setupEvents() {
        document.getElementById('addRowBtn').addEventListener('click',()=>{
            if(!allData[curMK]) allData[curMK]={transactions:[]};
            allData[curMK].transactions.push({fecha:new Date().toISOString().split('T')[0],descripcion:'',tipo:'',categoria:'ingreso',monto:0,medioPago:'',quien:'',observaciones:''});
            saveData(); renderApp();
        });
        document.getElementById('addMonthBtn').addEventListener('click',addMonth);
        document.getElementById('sortBtn').addEventListener('click',()=>{ const t=allData[curMK]?.transactions; if(t){sortTx(t);saveData();renderApp();} });
        document.getElementById('exportExcelBtn').addEventListener('click',exportExcel);
        document.getElementById('exportJSONBtn').addEventListener('click',()=>{ const b=new Blob([JSON.stringify(allData,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='backup-ingresos-egresos.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a); });
        document.getElementById('importJSONBtn').addEventListener('click',()=>document.getElementById('jsonFileInput').click());
        document.getElementById('jsonFileInput').addEventListener('change',importJSON);
        document.getElementById('syncAbonosBtn').addEventListener('click',syncAbonos);
        document.body.addEventListener('change',onTableChange);
        document.body.addEventListener('focusout',onFocusOut);
        document.body.addEventListener('click',onBodyClick);
        setupModal();
    }

    function onTableChange(e) {
        const t=e.target; const f=t.dataset.f; const tr=t.closest('tr[data-i]'); if(!f||!tr)return;
        const i=parseInt(tr.dataset.i); const mk=tr.dataset.mk;
        if(!allData[mk]?.transactions[i])return;
        const v=f==='monto'?parseFmt(t.value):t.value;
        allData[mk].transactions[i][f]=v;
        if(f==='categoria') allData[mk].transactions[i].tipo='';
        saveData(); renderApp();
    }

    function onFocusOut(e) { const t=e.target; if(t.dataset.f==='monto'&&t.closest('tr[data-i]')) t.value=fmt(parseFmt(t.value),false); }

    function onBodyClick(e) {
        const t=e.target;
        if(t.classList.contains('add-arch')) { const mk=t.dataset.mk; if(!allData[mk].transactions)allData[mk].transactions=[]; allData[mk].transactions.push({fecha:mk+'-01',descripcion:'',tipo:'',categoria:'ingreso',monto:0,medioPago:'',quien:'',observaciones:''}); saveData();renderApp();return; }
        if(t.classList.contains('sort-arch')) { const tx=allData[t.dataset.mk]?.transactions; if(tx){sortTx(tx);saveData();renderApp();} return; }
        if(t.classList.contains('del-month')) { const mk=t.dataset.mk; if(confirm(`¿Eliminar todo el mes de ${fmtMK(mk)}? ⚠️ No se puede deshacer.`)){delete allData[mk];saveData();renderApp();} return; }
        const tr=t.closest('tr[data-i]'); if(!tr)return;
        const i=parseInt(tr.dataset.i); const mk=tr.dataset.mk;
        if(t.classList.contains('del-btn')){ if(confirm('¿Eliminar esta fila?')){allData[mk].transactions.splice(i,1);saveData();renderApp();} }
        else if(t.classList.contains('obs-btn')){ obsIdx=i; obsMK=mk; document.getElementById('obsTextarea').value=allData[mk].transactions[i].observaciones||''; document.getElementById('obsModal').style.display='block'; }
    }

    function setupModal() {
        const m=document.getElementById('obsModal');
        document.getElementById('saveObsBtn').addEventListener('click',()=>{ if(obsIdx>=0&&obsMK){ allData[obsMK].transactions[obsIdx].observaciones=document.getElementById('obsTextarea').value; m.style.display='none'; obsIdx=-1; obsMK=''; saveData();renderApp(); } });
        document.getElementById('clearObsBtn').addEventListener('click',()=>{ document.getElementById('obsTextarea').value=''; });
        ['closeModalBtn','cancelObsBtn'].forEach(id=>document.getElementById(id).addEventListener('click',()=>{ m.style.display='none'; obsIdx=-1; obsMK=''; }));
        window.addEventListener('click',e=>{ if(e.target===m){ m.style.display='none'; obsIdx=-1; obsMK=''; } });
    }

    function addMonth() {
        const mk=prompt('Ingrese mes en formato AAAA-MM:'); if(!mk||!/^\d{4}-\d{2}$/.test(mk)){if(mk)alert('Formato incorrecto. Use AAAA-MM.');return;}
        if(allData[mk]){alert('Ese mes ya existe.');return;}
        allData[mk]={transactions:[{fecha:mk+'-01',descripcion:'',tipo:'',categoria:'ingreso',monto:0,medioPago:'',quien:'',observaciones:''}]};
        alert(`Mes ${fmtMK(mk)} agregado.`); saveData(); renderApp();
    }

    function sortTx(t) { t.sort((a,b)=>(a.descripcion||'').localeCompare(b.descripcion||'','es',{sensitivity:'base'})); }

    function syncAbonos() {
        try {
            const raw=localStorage.getItem('abonosData'); if(!raw){alert('No se encontraron datos de Abonos.');return;}
            const abonos=JSON.parse(raw); if(!Array.isArray(abonos))throw new Error("Formato incorrecto.");
            const monthly={};
            abonos.forEach(a=>{
                let mk=null;
                if(a.mesServicio) mk=`${a.mesServicio.year}-${String(a.mesServicio.month+1).padStart(2,'0')}`;
                else if(a.fechaPago){const d=new Date(a.fechaPago+'T00:00:00');mk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
                if(!mk)return;
                const esCobrado=['Pagado','Terminado','Pago Parcial'].includes(a.estado); if(!esCobrado)return;
                const monto=a.estado==='Pago Parcial'?(parseFloat(a.montoPagado)||0):(parseFloat(a.monto)||0);
                if(!monthly[mk])monthly[mk]={hon:0,bonos:0};
                if((a.tipo||'').trim()==='Pago de Bonos y AP') monthly[mk].bonos+=monto;
                else monthly[mk].hon+=monto;
            });
            let cnt=0;
            Object.keys(monthly).forEach(mk=>{
                if(!allData[mk])allData[mk]={transactions:[]};
                const t=allData[mk].transactions;
                if(monthly[mk].hon>0){
                    const idx=t.findIndex(r=>(r.descripcion||'').toLowerCase()==='honorarios profesionales');
                    if(idx>-1)t[idx].monto=monthly[mk].hon;
                    else t.unshift({fecha:mk+'-01',descripcion:'Honorarios Profesionales',tipo:'Honorarios Abono Mensual',categoria:'ingreso',monto:monthly[mk].hon,medioPago:'Automático',quien:'ESTUDIO',observaciones:'Sincronizado desde Abonos.'});
                }
                if(monthly[mk].bonos>0){
                    const idx=t.findIndex(r=>(r.descripcion||'').toLowerCase()==='pago bonos y aportes');
                    if(idx>-1)t[idx].monto=monthly[mk].bonos;
                    else t.push({fecha:mk+'-01',descripcion:'Pago Bonos y Aportes',tipo:'Pago Bonos y AP',categoria:'egreso',monto:monthly[mk].bonos,medioPago:'Automático',quien:'ESTUDIO',observaciones:'Sincronizado desde Abonos.'});
                }
                cnt++;
            });
            if(cnt>0){saveData();renderApp();alert(`✅ Sincronizado para ${cnt} mes(es).`);}
            else alert("No se encontraron datos para sincronizar.");
        } catch(err){alert(`Error: ${err.message}`);}
    }

    function exportExcel() {
        const rows=[['Mes','Fecha','Descripción','Tipo','Categoría','Ingreso','Egreso','Medio Pago','Quién','Observaciones']];
        Object.keys(allData).sort().forEach(mk=>{ (allData[mk].transactions||[]).forEach(r=>{ rows.push([fmtMK(mk),r.fecha,r.descripcion,r.tipo||'',r.categoria,r.categoria==='ingreso'?r.monto:0,r.categoria==='egreso'?r.monto:0,r.medioPago,r.quien,r.observaciones||'']); }); });
        const ws=XLSX.utils.aoa_to_sheet(rows); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Ingresos y Egresos'); XLSX.writeFile(wb,'Reporte_Contable_Garcia.xlsx');
    }

    function importJSON(e) {
        const f=e.target.files[0]; if(!f)return;
        const r=new FileReader(); r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(typeof d==='object'&&!Array.isArray(d)&&d!==null){if(confirm('Se reemplazarán todos los datos. ¿Continuar?')){allData=d;saveData();renderApp();alert('Importado.');}}else alert('Formato incorrecto.');}catch(err){alert(`Error: ${err.message}`);}};
        r.readAsText(f); e.target.value=null;
    }

    function calcTotals(txs) { const t={ingresos:0,egresos:0,balance:0}; txs.forEach(r=>{ const m=parseFloat(r.monto)||0; if(r.categoria==='ingreso')t.ingresos+=m; else t.egresos+=m; }); t.balance=t.ingresos-t.egresos; return t; }
    function fmtMK(mk) { if(!mk||!/^\d{4}-\d{2}$/.test(mk))return'Inválido'; const[y,m]=mk.split('-'); const d=new Date(y,m-1,1); return d.toLocaleDateString('es-AR',{month:'long',year:'numeric',timeZone:'UTC'}).replace(/^\w/,c=>c.toUpperCase()); }
    function fmt(n,sym=true) { let f=new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS'}).format(parseFloat(n)||0); return sym?f:f.replace(/\$\s?/g,'').trim(); }
    function parseFmt(s) { return parseFloat(String(s).replace(/\$\s?/g,'').replace(/\./g,'').replace(',','.'))||0; }

    init();
});
</script>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
<script>
const _CID='976943805178-lr5pvivhpstfnjp4leoolopo0kvb1cif.apps.googleusercontent.com';
const _AKEY='AIzaSyDSMWMM3lJM4ZNqRezhH-8uxaE1GVOjrrM';
const _FOLDER='Planilla Ingresos y Egresos - García & Asociados';
const _FILE='datos_ingresos_egresos.json';
let _tc, _gapiOk=false, _gisOk=false, _fid=null, _mid=null;

function gapiLoaded(){gapi.load('client',async()=>{await gapi.client.init({apiKey:_AKEY,discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});_gapiOk=true;_maybeEnable();});}
function gisLoaded(){_tc=google.accounts.oauth2.initTokenClient({client_id:_CID,scope:'https://www.googleapis.com/auth/drive.file',callback:''});_gisOk=true;_maybeEnable();}
function _maybeEnable(){if(_gapiOk&&_gisOk)document.getElementById('connectDriveBtn').onclick=_auth;}
function _dStatus(msg,ok,t){const el=document.getElementById('driveStatus');el.textContent=msg;el.style.display='block';el.className='data-status '+(ok===true?'status-success':ok===false?'status-warning':'');if(t)setTimeout(()=>{el.style.display='none';},t);}

function _auth(){
    _tc.callback=async r=>{
        if(r.error)return;
        _dStatus('✅ Conectado a Drive.',true,3000);
        document.getElementById('connectDriveBtn').style.display='none';
        document.getElementById('saveToDriveBtn').style.display='inline-block';
        document.getElementById('loadFromDriveBtn').style.display='inline-block';
        document.getElementById('saveToDriveBtn').onclick=_save;
        document.getElementById('loadFromDriveBtn').onclick=_load;
        await _findFolder();
    };
    if(!gapi.client.getToken())_tc.requestAccessToken({prompt:'consent'});else _tc.requestAccessToken({prompt:''});
}

async function _findFolder(){
    try{const r=await gapi.client.drive.files.list({q:`mimeType='application/vnd.google-apps.folder' and name='${_FOLDER}' and trashed=false`,fields:'files(id)'});
    if(r.result.files.length>0)_fid=r.result.files[0].id;
    else{const fr=await gapi.client.drive.files.create({resource:{name:_FOLDER,mimeType:'application/vnd.google-apps.folder'},fields:'id'});_fid=fr.result.id;}}
    catch(e){_dStatus('❌ Error en carpeta Drive.',false);}
}

async function _findFile(){try{const r=await gapi.client.drive.files.list({q:`name='${_FILE}' and '${_fid}' in parents and trashed=false`,fields:'files(id)'});_mid=r.result.files.length>0?r.result.files[0].id:null;}catch(e){_mid=null;}}

async function _save(){
    if(!_fid){alert("Reconectá a Drive.");return;}
    if(!confirm('¿Guardar respaldo en Drive?'))return;
    _dStatus('📤 Guardando...', null);
    try{
        const b64=btoa(unescape(encodeURIComponent(JSON.stringify(window.allData,null,2))));
        await _findFile();
        const bnd='---314159'; const meta={name:_FILE,mimeType:'application/json',...(_fid&&!_mid&&{parents:[_fid]})};
        const body=`--${bnd}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${bnd}\r\nContent-Type: application/json\r\nContent-Transfer-Encoding: base64\r\n\r\n${b64}\r\n--${bnd}--`;
        const r=await gapi.client.request({path:_mid?`/upload/drive/v3/files/${_mid}`:'/upload/drive/v3/files',method:_mid?'PATCH':'POST',params:{uploadType:'multipart'},headers:{'Content-Type':`multipart/related; boundary=${bnd}`},body});
        _mid=r.result.id; _dStatus('✅ Respaldo guardado.',true,5000);
    }catch(e){_dStatus('❌ Error al guardar.',false);}
}

async function _load(){
    if(!_fid){alert("Reconectá a Drive.");return;}
    if(!confirm('⚠️ Se reemplazarán los datos actuales con los de Drive. ¿Continuar?'))return;
    _dStatus('📥 Cargando...', null);
    try{
        await _findFile(); if(!_mid){_dStatus('No hay respaldo en Drive.',false,5000);return;}
        const r=await gapi.client.drive.files.get({fileId:_mid,alt:'media'});
        const d=typeof r.result==='string'?JSON.parse(r.result):r.result;
        if(typeof d==='object'&&!Array.isArray(d)&&d!==null){window.allData=d;window.saveData();window.renderApp();_dStatus('✅ Datos cargados de Drive.',true,5000);}
        else throw new Error("Formato incorrecto.");
    }catch(e){_dStatus(`❌ Error: ${e.message}`,false);}
}
</script>
