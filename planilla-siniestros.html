<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<title>Planilla de Siniestros - García & Asociados</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
:root {
    --primary-color: #2980b9;
    --secondary-color: #3498db;
    --danger-color: #e74c3c;
    --warning-color: #f39c12;
    --success-color: #2ecc71;
    --info-color: #9b59b6; /* Color para Vencimientos */
    --light-bg: #ecf0f1;
    --dark-text: #2c3e50;
    --light-text: #ffffff;
    --border-radius: 12px;
    --shadow: 0 10px 30px rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:1400px;margin:0 auto;background:#fff;border-radius:15px;box-shadow:0 20px 40px rgba(0,0,0,.1);overflow:hidden}
.header{background:linear-gradient(135deg,#020c24 0%,#081e4b 100%);color:#fff;padding:30px;text-align:center}
.header h1{font-size:2.4em;margin-bottom:8px}
.header-clock-container{display:flex;align-items:center;justify-content:center;gap:20px;margin-top:15px;padding-top:15px;border-top:1px solid rgba(255,255,255,.2)}
.analog-clock{width:60px;height:60px;background:rgba(255,255,255,.1);border-radius:50%;border:2px solid rgba(255,255,255,.5);position:relative;flex-shrink:0}
.analog-clock .hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;transform:rotate(0deg);transition:none;border-radius:3px}
.analog-clock .hour-hand{width:3px;height:28%;margin-left:-1.5px;background:var(--secondary-color)}
.analog-clock .min-hand{width:2px;height:38%;margin-left:-1px;background:var(--light-text)}
.analog-clock .second-hand{width:1px;height:42%;margin-left:-0.5px;background:var(--danger-color)}
#digital-clock{font-size:1em;opacity:.9;font-weight:500;letter-spacing:.5px;text-align:left}
.main-content{padding:30px}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:30px;margin-bottom:40px}
.card{background:#fff;border-radius:12px;padding:25px;box-shadow:0 8px 25px rgba(0,0,0,.1);border:1px solid #e0e0e0;transition:.3s}
.card:hover{transform:translateY(-5px);box-shadow:0 15px 35px rgba(0,0,0,.15)}
.card h3{color:#2c3e50;margin-bottom:18px;font-size:1.2em;display:flex;gap:8px;align-items:center}
.today-reviews{background:linear-gradient(135deg,#ff6b6b,#ee5a52);color:#fff}
.overdue-reviews{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff}
.pending-reviews{background:linear-gradient(135deg,#feca57,#ff9ff3);color:#fff}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:11px 22px;border-radius:8px;cursor:pointer;font-size:.95em;margin:5px;transition:.25s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(102,126,234,.4)}
.btn-success{background:linear-gradient(135deg,#2ecc71,#27ae60)}
.btn-info{background:linear-gradient(135deg,#3498db,#2980b9)}
.btn-danger{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.btn-warning{background:linear-gradient(135deg,#f39c12,#e67e22)}
.btn-sm{padding:6px 14px;font-size:.8em}
.data-status{background:#d4edda;border:1px solid #c3e6cb;color:#155724;padding:10px;border-radius:8px;margin-bottom:15px;text-align:center;font-size:.9em}
.filter-bar{background:#f8f9fa;padding:18px;border-radius:8px;margin-bottom:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-weight:600;margin-bottom:6px;color:#2c3e50;font-size:.85em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border:2px solid #e0e0e0;border-radius:8px;font-size:.9em}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
.reviews-list{max-height:400px;overflow:auto}
.review-item{background:#f8f9fa;border-left:4px solid #667eea;padding:14px;margin-bottom:9px;border-radius:0 8px 8px 0;display:flex;gap:10px;align-items:center;cursor:pointer;font-size:.82em}
.review-item.completed{background:#f2fdf5;border-left-color:#2ecc71;opacity:.85}
.review-item.today{border-left-color:#e74c3c}
.review-item.overdue{border-left-color:#f39c12}
.review-item:hover{background:#eef4ff}
.review-date{font-weight:600;color:#2c3e50}
.review-client{color:#667eea;font-weight:500;margin:4px 0}
.review-obs{font-style:italic;color:#555}
.review-obs-private{font-size:.9em;color:#8e44ad;font-style:italic;margin-top:5px;border-top:1px dashed #ddd;padding-top:5px}
.complete-btn{background:#e0e0e0;border:none;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px}
.complete-btn:hover{background:#c7c7c7}
.review-item.completed .complete-btn{background:#2ecc71;color:#fff}
.modal{
    display:none;
    position:fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background:rgba(0,0,0,.65);
    backdrop-filter:blur(4px);
    z-index:1000;
}
.modal.active{display:flex;align-items:center;justify-content:center}
.modal-content{
    background:#fff;
    border-radius:14px;
    padding:28px;
    max-width:900px;
    width:95%;
    max-height:90vh;
    overflow:auto
}
#alertModal .modal-content{border-top:10px solid var(--danger-color)}
#alertModal h2{color:var(--danger-color);text-align:center;margin-bottom:20px}
.close{float:right;font-size:26px;font-weight:700;color:#999;cursor:pointer;margin-top:-8px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.info-item{background:#fff;padding:10px;border-left:3px solid #667eea;border-radius:6px}
.info-label{font-size:.65em;text-transform:uppercase;color:#666;font-weight:600;letter-spacing:.5px}
.info-value{font-size:.85em;font-weight:500;color:#2c3e50;margin-top:2px;word-break:break-word}
.editable-field{cursor:pointer;padding:2px 4px;margin:-2px -4px}
.editable-field:hover{background:#eef5ff;border-radius:4px}
.history-item{background:#fff;border:1px solid #e0e0e0;border-left:4px solid #667eea;border-radius:6px;padding:12px;margin-bottom:10px;font-size:.9rem}

.history-item.completed {
    opacity: 0.7;
    background-color: #f8f9fa;
}
.history-item.completed > div:not(:last-child) { 
    text-decoration: line-through;
    color: #777;
}
.history-item.completed .history-date,
.history-item.completed .history-revision-date {
    text-decoration: none;
}
.history-item.completed .private-note-details {
    display: none; 
}

.history-date{font-size:.9em;font-weight:600;color:#667eea;margin-bottom:4px}
.history-revision-date{color:#c0392b;font-size:.85em;margin-top:4px}
.private-note-details{margin-top:10px}
.private-note-summary{cursor:pointer;font-weight:600;color:#8e44ad;-webkit-user-select:none;user-select:none;font-size:.9em}
.private-note-summary::-webkit-details-marker{display:none}
.private-note-summary:before{content:'➕';display:inline-block;margin-right:8px}
.private-note-details[open] .private-note-summary:before{content:'➖'}
.private-note-content{background:#fdf5e6;border-left:3px solid #f39c12;padding:10px;margin-top:8px;border-radius:5px;font-style:italic;color:#666}
.history-item-mediacion{border-left-color:#1abc9c}
.history-item-vencimiento{border-left-color:var(--info-color)}
.history-tag{font-size:.8em;color:#fff;padding:2px 8px;border-radius:10px;margin-left:auto;font-weight:500;display:inline-block}
.tag-task{background-color:var(--secondary-color)}
.tag-mediacion{background-color:#1abc9c}
.tag-vencimiento{background-color:var(--info-color)}
.form-section{background:#f8f9fa;padding:16px;border:1px solid #e0e0e0;border-radius:10px;margin-top:16px}
.action-buttons{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:18px}
.progress-bar-container{width:80%;margin:20px auto;height:20px;background-color:#ecf0f1;border-radius:10px;overflow:hidden}
.progress-bar{width:0;height:100%;background:linear-gradient(90deg,var(--secondary-color),var(--primary-color));transition:width .2s ease-out}
@media (max-width:780px){.reviews-list{max-height:300px}.action-buttons .btn{flex:1 1 100%}}
@media print{body *{visibility:hidden}.print-area,.print-area *{visibility:visible}.print-area{position:absolute;left:0;top:0;width:100%;padding:20px}.btn,.no-print{display:none!important}#generatedLetterText{white-space:pre-wrap}}

/* INICIO: ESTILOS DE LA NAVEGACIÓN SEMANAL (copiados de Planilla Jurídica) */
.weekly-navigation-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    margin-bottom: 10px;
}
.weekly-navigation-container button {
    background: none;
    border: none;
    color: var(--primary-color);
    font-size: 2.5em;
    cursor: pointer;
    transition: color 0.2s;
    line-height: 1;
}
.weekly-navigation-container button:hover {
    color: var(--secondary-color);
}
.weekly-navigation-container span {
    font-weight: 600;
    color: var(--dark-text);
    font-size: 1.1em;
}
/* FIN: ESTILOS DE LA NAVEGACIÓN SEMANAL */

.weekly-glance{display:flex;justify-content:space-around;padding:15px 0 5px 0;gap:10px;flex-wrap:wrap;transition:all .4s ease-in-out}
.day-circle{display:flex;flex-direction:column;align-items:center;justify-content:center;width:70px;height:70px;border-radius:50%;background:#f0f4f7;border:2px solid #e1e8ed;transition:all .3s ease}
.day-circle.has-tasks{background:#fff9e6;border-color:var(--warning-color);font-weight:700;cursor:pointer}
.day-circle.has-tasks:hover{transform:scale(1.1);box-shadow:0 0 15px rgba(243,156,18,.5)}
.day-circle.is-today{background:#e8f2ff;border-color:var(--primary-color)}
.day-circle .day-name{font-size:.9em;font-weight:600;color:var(--dark-text)}
.day-circle .day-count{font-size:1.4em;color:var(--primary-color);margin-top:2px}
.day-circle.has-tasks .day-count{color:#d35400}
.toggle-icon{display:inline-block;margin-left:8px}
</style>
</head>
<body>

<datalist id="marcasVehiculosList"></datalist>
<datalist id="companiasSegurosList"></datalist>

<div class="container">
  <div class="header">
    <h1>🚦 Planilla de Siniestros</h1>
    <p>García & Asociados</p>
    <div class="header-clock-container">
        <div class="analog-clock">
            <div class="hand hour-hand"></div>
            <div class="hand min-hand"></div>
            <div class="hand second-hand"></div>
        </div>
        <div id="digital-clock"></div>
    </div>
  </div>

  <div class="main-content">
    <div id="dataStatus" class="data-status" style="display:none;"></div>

    <section class="card" style="margin-bottom: 30px;">
        <h3 onclick="toggleVisibility('weeklyGlanceSection')" style="cursor: pointer; user-select: none;">
            🗓️ Resumen Semanal de Tareas
            <span class="toggle-icon">➖</span>
        </h3>
        <div id="weeklyGlanceSection" style="display: block;">
            <div class="weekly-navigation-container">
                <button onclick="prevWeek()">&#x25C0;</button> <span id="weekRange">Próxima Semana</span>
                <button onclick="nextWeek()">&#x25B6;</button> </div>
            <div id="weeklyGlanceContainer" class="weekly-glance"></div>
        </div>
    </section>
    
    <section class="card" style="margin-bottom: 30px; background-color: #e7f5ff;">
        <h3 onclick="toggleVisibility('advanceNoticeContainer')" style="cursor: pointer; user-select: none; border-color: #b3e0ff;">
            🔔 Avisos Previos (Vencimientos y Mediaciones) (<span id="advanceNoticeCount">0</span>)
            <span class="toggle-icon">➖</span>
        </h3>
        <div id="advanceNoticeContainer" class="reviews-list" style="max-height: 300px; display: block;"></div>
    </section>

    <div class="dashboard">
      <div class="card today-reviews"><h3>Eventos de Hoy</h3><div class="reviews-list" id="todayReviews"></div></div>
      <div class="card overdue-reviews"><h3>Eventos Vencidos</h3><div class="reviews-list" id="overdueReviews"></div></div>
      <div class="card pending-reviews"><h3>Próximos Eventos</h3><div class="reviews-list" id="upcomingReviews"></div></div>
    </div>

    <div style="text-align:center;margin-bottom:26px;">
      <button class="btn btn-success" onclick="showNewSiniestroModal()">➕ Agregar Siniestro</button>
      <button class="btn" onclick="showSiniestroSelectorModal()">👁️ Ver/Editar Siniestro</button>
      <button class="btn" onclick="exportToExcel()">📊 Exportar Excel</button>
      <button class="btn" onclick="exportData()">💾 Exportar JSON</button>
      <button class="btn btn-warning" onclick="importData()">📥 Importar JSON</button>
    </div>

    <div style="text-align:center;border-top:1px solid #ddd;padding-top:18px;margin-bottom:25px;">
      <button id="connectDriveBtn" class="btn" onclick="handleAuthClick()">🔗 Conectar a Drive & Calendar</button>
      <button id="saveToDriveBtn" class="btn btn-success" style="display:none;" onclick="saveToDrive()">📤 Guardar en Drive</button>
      <button id="loadFromDriveBtn" class="btn btn-warning" style="display:none;" onclick="loadFromDrive()">📥 Cargar de Drive</button>
      <div id="driveStatus" class="data-status" style="display:none;margin-top:10px;"></div>
      <div id="firebaseStatus" style="margin-top:10px;padding:8px 16px;border-radius:8px;font-size:.88em;display:inline-block;background:#fff3cd;color:#856404;border:1px solid #ffc107;">
        🔥 Firebase: Conectando...
      </div>
    </div>

    <div class="filter-bar">
      <div class="form-group"><label>Búsqueda General</label><input type="text" id="searchInput" placeholder="Cliente, DNI, reclamo..." onkeyup="renderAllSiniestrosList()"></div>
      <div class="form-group"><label>Estado</label><select id="estadoFilter" onchange="renderAllSiniestrosList()">
        <option value="">Todos (Activos)</option>
        <option value="FINALIZADA">Finalizada</option>
        <option value="FINALIZADA P">Finalizada P</option>
        <option value="RECHAZADO">Rechazado</option>
        <option value="SIN INICIAR">Sin iniciar</option>
        <option value="EJECUCION">Ejecución</option>
        <option value="DEMORADA">Demorada</option>
        <option value="MEDIACIONES">Mediaciones</option></select></div>
    </div>

    <div class="card">
      <h3>📋 Todos los Siniestros</h3>
      <div id="allSiniestros" class="reviews-list" style="max-height:580px;"></div>
    </div>
  </div>
</div>

<input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)">

<div id="newSiniestroModal" class="modal"><div class="modal-content"></div></div>
<div id="siniestroSelectorModal" class="modal"><div class="modal-content"></div></div>
<div id="siniestroInfoModal" class="modal"><div class="modal-content"></div></div>
<div id="alertModal" class="modal"><div class="modal-content"></div></div>
<div id="rescheduleModal" class="modal"><div class="modal-content"></div></div>
<div id="letterGenerationModal" class="modal"><div class="modal-content"></div></div>
<div id="convenioGenerationModal" class="modal"><div class="modal-content"></div></div>
<div id="dailyTasksModal" class="modal"><div class="modal-content"></div></div>

<div id="confirmModal" class="modal" style="z-index: 1001;">
    <div class="modal-content" style="max-width: 450px; border-top: 8px solid var(--warning-color);">
        <h2 id="confirmTitle" style="color: var(--dark-text); font-size: 1.4em; text-align: center; margin-bottom: 15px;">Cliente Existente</h2>
        <p id="confirmMessage" style="font-size: 1em; color: #555; text-align: center; margin-bottom: 25px;">¿Está seguro?</p>
        <div style="display: flex; justify-content: center; gap: 15px;">
            <button id="confirmBtnYes" class="btn btn-success">Sí, autocompletar</button>
            <button id="confirmBtnNo" class="btn btn-danger">Cancelar</button>
        </div>
    </div>
</div>
<script>
let siniestrosData=[];
let editingSiniestroId=null,editingField=null;
let onConfirmCallback = null;
let weeklyGlanceStartDate = new Date();

// === TABLA DE HONORARIOS POR COMPAÑÍA (SOLO ADMINISTRATIVO) ===
const HONORARIOS_POR_COMPANIA = {
    'ALLIANZ': 15,
    'ANTARTIDA ARGENTINA SEGUROS': 15,
    'ARGOS COMPAÑIA ARGENTINA DE SEGUROS GENERALES S.A.': 10,
    'ATM': 15,
    'COMPAÑIA DE SEGUROS LA MERCANTIL ANDINA S.A': 15,
    'COPAN': 12,
    'EL PROGRESO': 10,
    'FEDERACION PATRONAL': 15,
    'INTEGRITY': 15,
    'IUÑIGO': 15,
    'LA CAJA': 15,
    'LA MERIDIONAL': 15,
    'LIDERAR': 10,
    'MAPFRE': 10,
    'PROVINCIA SEGUROS': 10,
    'RIVADAVIA': 12,
    'SAN CRISTOBAL': 15,
    'SANCOR SEGUROS': 10,
    'SEGURCOOP COOPERATIVA DE SEGUROS LIMITADA': 10,
    'SWISS MEDICAL': 12,
    'ZURICH': 15,
};

// === LISTA DE COMPAÑÍAS DE SEGUROS ===
const COMPANIAS_SEGUROS = [
    'ALLIANZ',
    'ANTARTIDA ARGENTINA SEGUROS',
    'ARGOS COMPAÑIA ARGENTINA DE SEGUROS GENERALES S.A.',
    'ATM',
    'COMPAÑIA DE SEGUROS LA MERCANTIL ANDINA S.A',
    'COPAN',
    'EL PROGRESO',
    'FEDERACION PATRONAL',
    'INTEGRITY',
    'IUÑIGO',
    'LA CAJA',
    'LA MERIDIONAL',
    'LIDERAR',
    'MAPFRE',
    'PROVINCIA SEGUROS',
    'RIVADAVIA',
    'SAN CRISTOBAL',
    'SANCOR SEGUROS',
    'SEGURCOOP COOPERATIVA DE SEGUROS LIMITADA',
    'SWISS MEDICAL',
    'ZURICH',
    'OTRAS',
];

// === LISTA DE MARCAS DE VEHÍCULOS ===
const MARCAS_VEHICULOS = [
    'Acura','Alfa Romeo','Audi','BMW','BYD','Chery','Chevrolet','Chrysler',
    'Citroën','Dodge','Fiat','Ford','Geely','Honda','Hyundai','Infiniti',
    'Jeep','Kia','Lexus','Lifan','Lincoln','Mahindra','Maserati','Mazda',
    'Mercedes-Benz','Mini','Mitsubishi','Nissan','Peugeot','Porsche',
    'RAM','Renault','Seat','Skoda','Subaru','Suzuki','Tesla','Toyota',
    'Volkswagen','Volvo','OTRAS'
];

// --- INICIO: CÓDIGO DE GOOGLE DRIVE Y CALENDAR ---
let tokenClient, gapiReady = false, gisReady = false, gdDataFileId = null;
const GD_CLIENT_ID = '976943805178-lr5pvivhpstfnjp4leoolopo0kvb1cif.apps.googleusercontent.com';
const GD_API_KEY = 'AIzaSyDSMWMM3lJM4ZNqRezhH-8uxaE1GVOjrrM';
const GD_SCOPES = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.events';
const GD_DATA_FILE = 'datos_planilla_siniestros.json';

document.addEventListener('DOMContentLoaded', ()=>{ 
    weeklyGlanceStartDate.setHours(0, 0, 0, 0); 
    // Poblar datalist de marcas
    const marcasList = document.getElementById('marcasVehiculosList');
    if (marcasList) {
        MARCAS_VEHICULOS.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m;
            marcasList.appendChild(opt);
        });
    }
    // Poblar datalist de compañías
    const companiasList = document.getElementById('companiasSegurosList');
    if (companiasList) {
        COMPANIAS_SEGUROS.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            companiasList.appendChild(opt);
        });
    }
    loadData(); 
    renderAll(); 
    updateClock(); 
    setInterval(updateClock, 1000); 
    iniciarVigilanteDeMediaciones(); 
    revisarMediacionesVencidasAlCargar();
    window.addEventListener('click', e => { if (e.target.classList.contains('modal')) { closeModal(e.target.id); } });
    initFirebase(); // Iniciar Firebase al cargar
});
function gapiLoaded(){ gapi.load('client', initializeGapiClient); }
async function initializeGapiClient(){ try{ await gapi.client.init({ apiKey: GD_API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest','https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'] }); gapiReady=true; }catch(e){ console.error("Error GAPI client init:",e); updateDriveStatus('❌ Error al inicializar APIs de Google.'); }}
function gisLoaded(){ try{ tokenClient=google.accounts.oauth2.initTokenClient({ client_id:GD_CLIENT_ID, scope:GD_SCOPES, callback:tokenResponseCallback }); gisReady=true; }catch(e){ console.error("Error GIS client init:",e); updateDriveStatus('❌ Error al inicializar autenticación de Google.'); }}
function handleAuthClick(){ if(tokenClient){ tokenClient.requestAccessToken({prompt:'consent'}); }else{ updateDriveStatus('❌ La autenticación de Google no está lista.'); }}
async function tokenResponseCallback(resp){ if(resp.error){ updateDriveStatus('❌ Error de autenticación. Verifique pop-ups.'); return; } try{ gapi.client.setToken({access_token:resp.access_token}); document.getElementById('connectDriveBtn').style.display='none'; document.getElementById('saveToDriveBtn').style.display='inline-block'; document.getElementById('loadFromDriveBtn').style.display='inline-block'; updateDriveStatus('✅ Conectado. Buscando respaldo...'); await findDataFile(); }catch(e){ console.error("Error en callback:",e); updateDriveStatus('❌ Ocurrió un error después de conectar.'); }}

// --- MODIFICADO: Función loadFromDrive con "Cache Buster" para móviles ---
async function loadFromDrive(){ 
    if(!gapi.client.getToken()?.access_token){alert('No está conectado a Google.');return;} 
    if(!gdDataFileId){alert('No se ha encontrado un archivo de respaldo.');return;} 
    if(!confirm('¿Reemplazar datos locales con la copia de Drive?'))return; 
    
    updateDriveStatus('📥 Cargando desde Drive (Sin Caché)...'); 
    try{ 
        // USAMOS FETCH CON UN TIMESTAMP PARA EVITAR LA CACHÉ DEL CELULAR
        const token = gapi.client.getToken().access_token;
        const url = `https://www.googleapis.com/drive/v3/files/${gdDataFileId}?alt=media&nocache=${Date.now()}`;
        
        const response = await fetch(url, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (!response.ok) {
            throw new Error(`Error de red: ${response.status} ${response.statusText}`);
        }

        const imported = await response.json();

        if(!Array.isArray(imported))throw new Error('Formato inválido.'); 
        siniestrosData=sanitizeData(imported); 
        saveData(); 
        renderAll(); 
        updateDriveStatus('✅ Datos cargados desde Drive (Frescos).'); 
    }catch(e){ 
        console.error("Error cargando datos:",e); 
        updateDriveStatus(`❌ Error al cargar: ${e.message}`); 
    }
}

const FIREBASE_KEY = 'planilla_siniestros'; // Clave en la base de datos

let firebaseApp, firebaseDB, firebaseRef;
let firebaseConectado = false;
let ignorarProximoCambioFirebase = false; // Evita bucles al guardar

function initFirebase() {
    if (typeof firebase === 'undefined') {
        setTimeout(initFirebase, 600);
        return;
    }
    try {
        firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
        firebaseDB = firebase.database();
        firebaseRef = firebaseDB.ref(FIREBASE_KEY);

        // Escuchar cambios en tiempo real
        firebaseRef.on('value', (snapshot) => {
            if (ignorarProximoCambioFirebase) {
                ignorarProximoCambioFirebase = false;
                return;
            }
            const data = snapshot.val();
            if (data && Array.isArray(data)) {
                siniestrosData = sanitizeData(data);
                localStorage.setItem('planilla_siniestros_data', JSON.stringify(siniestrosData));
                renderAll();
                updateFirebaseStatus('✅ Sincronizado en tiempo real', 'ok');
            } else if (data === null) {
                // Base de datos vacía, intentar cargar desde localStorage
                const local = localStorage.getItem('planilla_siniestros_data');
                if (local) {
                    siniestrosData = sanitizeData(JSON.parse(local));
                    saveToFirebase(); // Subir lo local a Firebase
                    updateFirebaseStatus('✅ Datos locales subidos a Firebase', 'ok');
                } else {
                    updateFirebaseStatus('✅ Firebase listo (base vacía)', 'ok');
                }
            }
            firebaseConectado = true;
        }, (error) => {
            console.error('Error Firebase listener:', error);
            updateFirebaseStatus('❌ Error de conexión Firebase', 'error');
            firebaseConectado = false;
        });

        // Detectar estado de conexión
        firebaseDB.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                firebaseConectado = true;
                updateFirebaseStatus('✅ Firebase: Conectado en tiempo real', 'ok');
            } else {
                firebaseConectado = false;
                updateFirebaseStatus('⚠️ Firebase: Sin conexión (modo local)', 'warn');
            }
        });

    } catch(e) {
        console.error('Error iniciando Firebase:', e);
        updateFirebaseStatus('❌ Error al iniciar Firebase', 'error');
    }
}

function updateFirebaseStatus(msg, tipo) {
    const el = document.getElementById('firebaseStatus');
    if (!el) return;
    el.textContent = '🔥 ' + msg;
    if (tipo === 'ok') {
        el.style.background = '#d4edda';
        el.style.color = '#155724';
        el.style.borderColor = '#c3e6cb';
    } else if (tipo === 'warn') {
        el.style.background = '#fff3cd';

        el.style.borderColor = '#ffc107';
    } else {
        el.style.background = '#f8d7da';
        el.style.color = '#721c24';
        el.style.borderColor = '#f5c6cb';
    }
}

            });
    } catch(e) {

    }
}

    s.chasis = s.chasis || '';
    s.motor = s.motor || '';
    s.colorVehiculo = s.colorVehiculo || '';
    // Nuevos campos tercero

    s.observaciones=Array.isArray(s.observaciones)?s.observaciones:[]; s.mediaciones_list=Array.isArray(s.mediaciones_list)?s.mediaciones_list:[]; s.vencimientos_list=Array.isArray(s.vencimientos_list)?s.vencimientos_list:[]; s.observaciones.forEach(o=>{o.id=o.id||generateId({});o.completed=typeof o.completed==='boolean'?o.completed:false;}); s.mediaciones_list.forEach(m=>{m.id=m.id||generateId({});m.completed=typeof m.completed==='boolean'?m.completed:false;m.alertaMostrada=typeof m.alertaMostrada==='boolean'?m.alertaMostrada:false;m.avisoPrevio=m.avisoPrevio||'1';}); s.vencimientos_list.forEach(v=>{v.id=v.id||generateId({});v.completed=typeof v.completed==='boolean'?v.completed:false;v.avisoPrevio=v.avisoPrevio||'1';}); try{updateSiniestroNextRevision(s);}catch(e){console.error('Error en revisión:',e);}}); return data; }

const todayYMD = (d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`)(new Date());

function formatDate(d) {
    if (!d) return 'No definida';
    const date = new Date(d);
    if (isNaN(date.getTime())) {
        console.warn(`Se encontró una fecha inválida: "${d}"`);
        return 'Fecha Inválida';
    }
    const adjustedDate = new Date(date.getTime() + (date.getTimezoneOffset() * 60000));
    try {
        const [y, m, day] = adjustedDate.toISOString().split('T')[0].split('-');
        return `${day}/${m}/${y}`;
    } catch (e) {
        console.error("Error al formatear una fecha procesada:", d, e);
        return 'Error de Fecha';
    }
}

function formatTime(t){ return t||''; }
function isToday(d){ return d&&d===todayYMD; }
function isPastDue(d){ return d&&d<todayYMD; }
function getDaysDifference(d){ if(!d)return 999; return Math.ceil((new Date(d)-new Date(todayYMD))/864e5); }
function generateId(it){ return`EVT_${(it.cliente||'S').slice(0,3).toUpperCase()}_${Date.now()}_${Math.floor(Math.random()*1e3)}`; }
function getDisplayName(s){ return`${s.cliente||'S/N'} - Reclamo: ${s.numeroReclamo||'S/N'} (${s.estado||'S/E'})`; }
function formatCurrency(v){ if(v==null||v==='')return'S/D'; return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS'}).format(v); }
function toggleVisibility(id){ const el=document.getElementById(id),icon=el.previousElementSibling.querySelector('.toggle-icon'); const isSection=id.includes('weeklyGlanceSection'); if(getComputedStyle(el).display==='none'){el.style.display=isSection?'block':'block';icon.textContent='➖';}else{el.style.display='none';icon.textContent='➕';}}
function updateSiniestroNextRevision(s){ if(!s)return; const future=(s.observaciones||[]).filter(o=>!o.completed&&o.proximaRevision).sort((a,b)=>a.proximaRevision.localeCompare(b.proximaRevision)); if(future.length){s.fechaRevision=future[0].proximaRevision;s.observacion=future[0].texto;if(future[0].textoPrivado)s.observacion+=` (Privado: ${future[0].textoPrivado})`;}else{s.fechaRevision='';s.observacion='No hay tareas pendientes';}}

function toggleCompleted(e,sid,oid,type='task'){ 
    e.stopPropagation(); 
    const s=siniestrosData.find(x=>x.id===sid); 
    if(!s)return; 
    let list; 
    if(type==='task')list=s.observaciones; 
    else if(type==='mediacion')list=s.mediaciones_list; 
    else if(type==='vencimiento')list=s.vencimientos_list; 
    if(list){
        const item=list.find(y=>y.id===oid);
        if(item)item.completed=!item.completed;
    } 
    if(type==='task')updateSiniestroNextRevision(s); 
    saveData(); 
    renderAll(); 

    const infoModal = document.getElementById('siniestroInfoModal');
    if (infoModal.classList.contains('active')) {
        const deleteButton = infoModal.querySelector('.action-buttons .btn-danger');
        if (deleteButton) {
            const onclickString = deleteButton.getAttribute('onclick');
            const match = onclickString.match(/'([^']+)'/);
            if (match && match[1] === sid) {
                const historyListEl = document.getElementById(`history-list-${sid}`);
                const currentSiniestro = siniestrosData.find(x => x.id === sid);
                if (historyListEl && currentSiniestro) {
                    historyListEl.innerHTML = renderHistoryList(currentSiniestro);
                }
            }
        }
    }
}

// --- FUNCIONES DE NAVEGACIÓN SEMANAL ---
function nextWeek() {
    // Avanza 7 días
    weeklyGlanceStartDate.setDate(weeklyGlanceStartDate.getDate() + 7);
    renderWeeklyGlance(weeklyGlanceStartDate);
}

function prevWeek() {
    // Retrocede 7 días
    weeklyGlanceStartDate.setDate(weeklyGlanceStartDate.getDate() - 7);
    renderWeeklyGlance(weeklyGlanceStartDate);
}

function renderWeeklyGlance(startDate){ 
    const container=document.getElementById('weeklyGlanceContainer'); 
    const rangeDisplay = document.getElementById('weekRange');
    if(!container || !rangeDisplay) return; 

    const counts=Array(7).fill(0); 
    const today=new Date(); 
    today.setHours(0,0,0,0); 
    
    // Clonamos la fecha de inicio para no modificar la original
    const currentStart = new Date(startDate);
    currentStart.setHours(0, 0, 0, 0);

    // Determinamos el rango de días a mostrar (7 días a partir de currentStart)
    const rangeEnd = new Date(currentStart);
    rangeEnd.setDate(rangeEnd.getDate() + 6);
            
    // Actualizar el rango de visualización
    const startStr = currentStart.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    const endStr = rangeEnd.toLocaleDateString('es-AR', { day: 'numeric', month: 'short', year: 'numeric' });
    rangeDisplay.textContent = `${startStr} - ${endStr}`;

    const allItems=siniestrosData.flatMap(s=>[
        ...(s.observaciones||[]).filter(o=>!o.completed&&o.proximaRevision).map(o=>({reviewDate:o.proximaRevision})),
        ...(s.mediaciones_list||[]).filter(m=>m.fecha&&!m.completed).map(m=>({reviewDate:m.fecha})),
        ...(s.vencimientos_list||[]).filter(v=>v.fecha&&!v.completed).map(v=>({reviewDate:v.fecha}))
    ]); 
    
    allItems.forEach(item=>{
        if(!item.reviewDate)return; 
        const itemDate=new Date(item.reviewDate+'T00:00:00');
        // Calcular la diferencia de días entre el ítem y el inicio del rango
        const diffDays=Math.round((itemDate - currentStart)/864e5); 

        if(diffDays>=0&&diffDays<7)counts[diffDays]++;
    }); 
    
    const dayNames=['D','L','M','M','J','V','S']; 
    let html=''; 
    for(let i=0;i<7;i++){ 
        const date=new Date(currentStart); 
        date.setDate(currentStart.getDate()+i); 
        const dayOfWeek=date.getDay(); 
        const dayName=dayNames[dayOfWeek]; 
        const dateNumber=date.getDate();
        const isoDateString=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; 
        
        // Determinamos si el día actual de la iteración es HOY
        const isTheActualToday = date.toDateString() === today.toDateString();

        const hasTasks=counts[i]>0; 
        html+=`<div class="day-circle ${hasTasks?'has-tasks':''} ${isTheActualToday?'is-today':''}" title="${date.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}" ${hasTasks?`onclick="showTasksForDate('${isoDateString}')"`:''}> <span class="day-name">${dayName} ${dateNumber}</span> <span class="day-count">${counts[i]}</span> </div>`; 
    } 
    container.innerHTML=html||'<p style="text-align: center; color: #666; margin-top: 10px;">No hay tareas programadas en este rango de 7 días.</p>'; 
}

function renderAdvanceNotices(){ 
    const container=document.getElementById('advanceNoticeContainer'); 
    if(!container)return; 
    const itemsToNotice=[]; 
    
    siniestrosData.forEach(s=>{ 
        const criticalItems=[
            ...(s.mediaciones_list||[]).map(item=>({...item,dueDate:item.fecha,type:'mediacion',text:`MEDIACIÓN: ${item.texto}`})),
            ...(s.vencimientos_list||[]).map(item=>({...item,dueDate:item.fecha,type:'vencimiento',text:`VENCIMIENTO: ${item.texto}`}))
        ]; 
        
        criticalItems.forEach(item=>{ 
            const noticeDays=parseInt(item.avisoPrevio,10); 
            if(!item.completed&&noticeDays>0&&item.dueDate){ 
                const daysDifference=getDaysDifference(item.dueDate); 
                // MODIFICADO: >= 0 para incluir HOY en la lista de avisos si es necesario
                if(daysDifference>=0 && daysDifference<=noticeDays) {
                    itemsToNotice.push({siniestro:s,item,daysDifference}); 
                }
            }
        }); 
    }); 
    
    itemsToNotice.sort((a,b)=>a.item.dueDate.localeCompare(b.item.dueDate)); 
    document.getElementById('advanceNoticeCount').textContent=itemsToNotice.length; 
    
    if(itemsToNotice.length===0){
        container.innerHTML='<p style="text-align:center;color:#666;">No hay avisos previos.</p>';
        return;
    } 
    
    container.innerHTML=itemsToNotice.map(({siniestro,item,daysDifference})=>{ 
        let dateInfo;
        // MODIFICADO: Mostrar texto especial si es hoy
        if (daysDifference === 0) {
            dateInfo = `<span style="color:var(--danger-color); font-weight:800;">¡ES HOY!</span> (${formatDate(item.dueDate)})`;
        } else {
            dateInfo = `Vence en ${daysDifference} día${daysDifference>1?'s':''} (${formatDate(item.dueDate)})`;
        }

        return`<div class="review-item" onclick="showSiniestroModal('${siniestro.id}')"><div class="review-item-content"><div class="review-date">${dateInfo}</div><div class="review-client">${getDisplayName(siniestro)}</div><div class="review-obs">${item.text}</div></div></div>`; 
    }).join(''); 
}

function showTasksForDate(dateString){ const formattedDate=formatDate(dateString); const modal=document.getElementById('dailyTasksModal'); const tasksForDate=siniestrosData.flatMap(s=>[...(s.observaciones||[]).filter(o=>!o.completed&&o.proximaRevision===dateString).map(o=>({...o,siniestro:s,type:'task'})),...(s.mediaciones_list||[]).filter(m=>!m.completed&&m.fecha===dateString).map(m=>({...m,siniestro:s,type:'mediacion'})),...(s.vencimientos_list||[]).filter(v=>!v.completed&&v.fecha===dateString).map(v=>({...v,siniestro:s,type:'vencimiento'}))]); const content=` <span class="close" onclick="closeModal('dailyTasksModal')">&times;</span><h2>Tareas para ${formattedDate}</h2> <div class="reviews-list" style="max-height:60vh;"> ${tasksForDate.length===0?'<p style="text-align:center;color:#666;">No hay tareas para esta fecha.</p>':tasksForDate.map(item=>{ const toggleFunc=`toggleCompleted(event,'${item.siniestro.id}','${item.id}','${item.type}')`; let timeLabel='',label=''; if(item.type==='mediacion'){timeLabel=formatTime(item.hora);label='MEDIACIÓN:';} if(item.type==='vencimiento'){label='VENCIMIENTO:';} return`<div class="review-item ${item.completed ? 'completed' : ''}"> <button class="complete-btn" onclick="${toggleFunc}">✔</button> <div class="review-item-content" onclick="showSiniestroModal('${item.siniestro.id}')"> <div class="review-date">${timeLabel}</div> <div class="review-client">${item.siniestro.cliente}</div> <div class="review-obs"><b>${label}</b> ${item.texto}</div> ${item.type==='task'&&item.textoPrivado?`<div class="review-obs-private">🔒 ${item.textoPrivado}</div>`:''} </div> </div>`; }).join('')} </div>`; modal.querySelector('.modal-content').innerHTML=content; modal.classList.add('active'); }

function renderAllSiniestrosList(){ 
    const sterm=document.getElementById('searchInput').value.toLowerCase(); 
    const estado=document.getElementById('estadoFilter').value; 
    
    const filtrados=siniestrosData.filter(s=>{ 
        const searchString=Object.values(s).flat().join(' ').toLowerCase(); 
        const matchS=!sterm||searchString.includes(sterm); 
        
        let matchE;
        if (estado === "") { 
            matchE = s.estado !== 'FINALIZADA' && s.estado !== 'FINALIZADA P';
        } else {
            matchE = s.estado === estado;
        }
        
        return matchS&&matchE; 
    }).sort((a,b)=>(a.fechaRevision||'9999').localeCompare(b.fechaRevision||'9999')); 
    
    const container=document.getElementById('allSiniestros'); 
    if(!container)return; 
    container.innerHTML=filtrados.length?filtrados.map(s=>{ 
        const pending=(s.observaciones||[]).some(o=>!o.completed&&o.proximaRevision); 
        let cls = `review-item ${isToday(s.fechaRevision)?'today':''} ${isPastDue(s.fechaRevision)?'overdue':''}`;
        if (s.estado === 'FINALIZADA' || s.estado === 'FINALIZADA P') {
            cls = 'review-item completed'; 
        } else if (!pending) {
            cls = 'review-item completed'; 
        }
        
        const lastWorkedObs=(s.observaciones||[]).filter(o=>o.fechaTrabajado).sort((a,b)=>b.fechaTrabajado.localeCompare(a.fechaTrabajado))[0]; 
        const lastWorkedDate=lastWorkedObs?lastWorkedObs.fechaTrabajado:null; 
        
        return`<div class="${cls}" onclick="showSiniestroModal('${s.id}')"><div class="review-item-content"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;"><div class="review-date">Próx. Tarea: ${formatDate(s.fechaRevision)}</div>${lastWorkedDate?`<div class="review-date" style="color:#27ae60;">Trabajado: ${formatDate(lastWorkedDate)}</div>`:''}</div><div class="review-client">${s.cliente} - Reclamo: ${s.numeroReclamo||'S/N'}</div><div class="review-obs">${s.observacion}</div></div></div>`; 
    }).join(''):'<p>No se encontraron siniestros.</p>'; 
}

function autocompletarCliente(nombre) {
    if (!nombre) return;
    const nombreLower = nombre.toLowerCase();
    const clienteExistente = siniestrosData.find(s => s.cliente && s.cliente.toLowerCase() === nombreLower);
    
    if (clienteExistente) {
        const message = 'Cliente existente. ¿Desea autocompletar los datos?';
        
        const autocompletarAccion = () => {
            document.getElementById('newGenero').value = clienteExistente.genero || 'Masculino';
            document.getElementById('newDni').value = clienteExistente.dni || '';
            document.getElementById('newCelular').value = clienteExistente.celular || '';
            document.getElementById('newMailCliente').value = clienteExistente.mailCliente || '';
            document.getElementById('newAseguradoEn').value = clienteExistente.aseguradoEn || '';
            if (document.getElementById('newFechaNacimiento')) document.getElementById('newFechaNacimiento').value = clienteExistente.fechaNacimiento || '';
            if (document.getElementById('newCuil')) document.getElementById('newCuil').value = clienteExistente.cuil || '';
        };

        showConfirmModal(message, autocompletarAccion);
    }
}

function enviarSiniestroAAbonos(s) {
    if (typeof firebase === 'undefined' || !firebase.apps.length) return;
    // Esperar 2 segundos para que Firebase termine de guardar el siniestro
    setTimeout(() => {
        try {
            const db = firebase.database();
            const abonosRef = db.ref('planilla_abonos');
            const mapEstado = {
                'SIN INICIAR':    'Pendiente',
                'EJECUCION':      'Pendiente',
                'MEDIACIONES':    'Pendiente',
                'DEMORADA':       'Pendiente',
                'FINALIZADA P':   'Pendiente',
                'FINALIZADA':     'Terminado',
                'RECHAZADO':      'Terminado',
            };
            const nuevoAbono = {
                id: 'SIN_' + s.id,
                siniestroId: s.id,
                cliente: s.cliente || '',
                expediente: s.numeroReclamo || '',
                telefono: s.celular || '',
                autorizaWhatsapp: false,
                ultimoContactoAgente: '',
                respuestaCliente: '',
                escalarACamila: false,
                tipo: 'Honorarios Siniestro',
                monto: parseFloat(s.honorarios) || 0,
                montoBase: parseFloat(s.honorarios) || 0,
                deudaAcumulada: 0,
                montoPagado: '',
                fechaPago: '',
                estado: mapEstado[s.estado] || 'Ejecución de Honorarios',
                observaciones: `Generado automáticamente desde Siniestros. Reclamo: ${s.numeroReclamo||'S/N'}. Aseguradora: ${s.contra||'S/N'}.`,
                observacionesAuto: '',
                mesServicio: null,
                origenSiniestro: true
            };

            abonosRef.once('value', snapshot => {
                const abonos = snapshot.val();
                const lista = Array.isArray(abonos) ? [...abonos] : [];
                const yaExiste = lista.some(a => a && a.siniestroId === s.id);
                if (yaExiste) {
                    console.log('Abono ya existe para:', s.id);
                    return;
                }
                lista.push(nuevoAbono);
                abonosRef.set(lista).then(() => {
                    updateDataStatus('✅ Siniestro enviado a Planilla de Abonos automáticamente.');
                    console.log('Abono creado OK para:', s.cliente);
                }).catch(err => {
                    console.error('Error al enviar a abonos:', err);
                });
            });
        } catch(e) {
            console.error('Error en enviarSiniestroAAbonos:', e);
        }
    }, 2000);
}

function actualizarAbonosDesdeSiniestro(s) {
    if (typeof firebase === 'undefined' || !firebase.apps.length) return;
    try {
        const db = firebase.database();
        const abonosRef = db.ref('planilla_abonos');
        abonosRef.once('value', snapshot => {
            const abonos = snapshot.val();
            if (!Array.isArray(abonos)) return;
            const mapEstado = {
                'SIN INICIAR':    'Pendiente',
                'EJECUCION':      'Pendiente',
                'MEDIACIONES':    'Pendiente',
                'DEMORADA':       'Pendiente',
                'FINALIZADA P':   'Pendiente',
                'FINALIZADA':     'Terminado',
                'RECHAZADO':      'Terminado',
            };
            let modificado = false;
            abonos.forEach((a, i) => {
                if (a.siniestroId === s.id) {
                    abonos[i].estado = mapEstado[s.estado] || a.estado;
                    abonos[i].monto = parseFloat(s.honorarios) || a.monto;
                    abonos[i].montoBase = parseFloat(s.honorarios) || a.montoBase;
                    abonos[i].expediente = s.numeroReclamo || a.expediente;
                    modificado = true;
                }
            });
            if (modificado) {
                abonosRef.set(abonos).then(() => {
                    updateDataStatus('✅ Abono actualizado automáticamente.');
                });
            }
        });
    } catch(e) {
        console.error('Error en actualizarAbonosDesdeSiniestro:', e);
    }
}

="margin-bottom:8px;font-size:.9em;">Historial de Eventos</h4><div id="history-list-${s.id}" style="max-height:230px;overflow:auto;padding-right:5px;">${renderHistoryList(s)}</div></div> <div style="display:grid;grid-template-columns:1fr;gap:15px;margin-top:15px;"> <div class="form-section"><h4>📝 Agregar Tarea</h4><form onsubmit="addObservation(event,'${s.id}')"><div class="form-group"><label>Texto (Público)</label><textarea id="newObsText" rows="2"></textarea></div><div class="form-group"><label>Notas (Privadas)</label><textarea id="newObsTextPrivate" rows="2"></textarea></div><div class="form-group"><label>Fecha de Revisión</label><input type="date" id="newRevisionDate" required></div><button class="btn btn-success" type="submit">Guardar Tarea</button></form></div> <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px;"> <div class="form-section"><h4 onclick="toggleVisibility('mediacion-form-fields')" style="cursor:pointer;user-select:none;"><span class="toggle-icon">➕</span> Agendar Mediación</h4><form id="mediacion-form-fields" onsubmit="addMediacion(event,'${s.id}')" style="display:none;margin-top:15px;"><div class="form-group"><label>Descripción</label><textarea id="newMediacionText" rows="2" required></textarea></div><div class="form-group"><label>Fecha</label><input type="date" id="newMediacionDate" required></div><div class="form-group"><label>Hora</label><input type="time" id="newMediacionTime" required></div><div class="form-group"><label>Aviso Previo</label><select id="newMediacionAvisoPrevio"><option value="1" selected>1 día antes</option><option value="2">2 días</option><option value="7">1 semana</option><option value="0">Sin aviso</option></select></div><button class="btn btn-success" type="submit">Guardar Mediación</button></form></div> <div class="form-section"><h4 onclick="toggleVisibility('vencimiento-form-fields')" style="cursor:pointer;user-select:none;"><span class="toggle-icon">➕</span> Agregar Vencimiento</h4><form id="vencimiento-form-fields" onsubmit="addVencimiento(event,'${s.id}')" style="display:none;margin-top:15px;"><div class="form-group"><label>Descripción</label><textarea id="newVencimientoText" rows="2" required></textarea></div><div class="form-group"><label>Fecha</label><input type="date" id="newVencimientoDate" required></div><div class="form-group"><label>Aviso Previo</label><select id="newVencimientoAvisoPrevio"><option value="1" selected>1 día antes</option><option value="3">3 días</option><option value="7">1 semana</option><option value="0">Sin aviso</option></select></div><button class="btn btn-success" type="submit">Guardar Vencimiento</button></form></div> </div> </div> <div class="action-buttons"><button class="btn btn-info" onclick="printFicha('${s.id}')">🖨️ Ficha</button><button class="btn" onclick="startLetterGeneration('${s.id}')">✉️ Generar Carta Patrocinio</button><button class="btn btn-warning" onclick="startConvenioGeneration('${s.id}')">⚖️ Generar Convenio</button><button class="btn btn-danger" onclick="deleteSiniestro('${s.id}')">🗑️ Eliminar</button></div>${datalistsHTML}`; 
    document.getElementById('siniestroInfoModal').querySelector('.modal-content').innerHTML=html; 
    document.getElementById('siniestroInfoModal').classList.add('active'); 
}

function renderHistoryList(s){ const tasks=(s.observaciones||[]).map(o=>({...o,type:'task',date:o.proximaRevision})); const mediaciones=(s.mediaciones_list||[]).map(m=>({...m,type:'mediacion',date:m.fecha})); const vencimientos=(s.vencimientos_list||[]).map(v=>({...v,type:'vencimiento',date:v.fecha})); const allEvents=[...tasks,...mediaciones,...vencimientos].sort((a,b)=>(b.date||'').localeCompare(a.date||'')); return allEvents.length?allEvents.map(item=>{ let tagClass,tagText,itemClass,dateLabel,dateValue,deleteFunc,timeValue=''; switch(item.type){ case'task':tagClass='tag-task';tagText='TAREA';dateLabel='Creación';dateValue=item.fecha;deleteFunc=`deleteObs('${s.id}','${item.id}')`;break; case'mediacion':tagClass='tag-mediacion';tagText='MEDIACIÓN';itemClass='history-item-mediacion';dateLabel='Fecha';dateValue=item.fecha;timeValue=formatTime(item.hora);deleteFunc=`deleteMediacion('${s.id}','${item.id}')`;break; case'vencimiento':tagClass='tag-vencimiento';tagText='VENCIMIENTO';itemClass='history-item-vencimiento';dateLabel='Fecha';dateValue=item.fecha;deleteFunc=`deleteVencimiento('${s.id}','${item.id}')`;break; } const toggleFunc = `toggleCompleted(event, '${s.id}', '${item.id}', '${item.type}')`; const toggleButtonHtml = item.completed ? `<button class="btn btn-warning btn-sm" onclick="${toggleFunc}">🔄 Deshacer</button>` : `<button class="btn btn-success btn-sm" onclick="${toggleFunc}">✅ Completar</button>`; const privateNoteHtml=item.type==='task'&&item.textoPrivado?`<details class="private-note-details"><summary class="private-note-summary">🔒 Ver Nota Privada</summary><div class="private-note-content">${item.textoPrivado}</div></details>`:''; return`<div class="history-item ${itemClass||''} ${item.completed?'completed':''}" id="${item.type}-item-${item.id}"><div style="display:flex;align-items:center;"><div class="history-date">${dateLabel}: ${formatDate(dateValue)} ${timeValue}</div><span class="history-tag ${tagClass}">${tagText}</span></div>${item.type==='task'&&item.fechaTrabajado?`<div class="history-date" style="color:#27ae60;">Trabajado: ${formatDate(item.fechaTrabajado)}</div>`:''}<div>${item.texto}</div>${privateNoteHtml}${item.type==='task'?`<div class="history-revision-date">Revisión: ${formatDate(item.proximaRevision)}</div>`:''}<div style="margin-top:6px;display:flex;gap:6px;">${toggleButtonHtml}${item.type==='task'?`<button class="btn btn-sm" onclick="editObs('${s.id}','${item.id}')">Editar</button>`:''}<button class="btn btn-danger btn-sm" onclick="${deleteFunc}">Eliminar</button></div></div>`; }).join(''):'<p style="font-size:.8em;">Sin eventos.</p>'; }
function editObs(sid,oid){ const s=siniestrosData.find(x=>x.id===sid),o=s.observaciones.find(k=>k.id===oid); const el=document.getElementById(`task-item-${o.id}`); if(el)el.innerHTML=`<div class="form-group"><label>Texto Público</label><textarea id="edit-obs-text-${o.id}" rows="2" style="font-size:1rem;min-height:60px;">${o.texto}</textarea></div><div class="form-group"><label>Notas Privadas</label><textarea id="edit-obs-private-${o.id}" rows="2" style="font-size:1rem;min-height:60px;">${o.textoPrivado||''}</textarea></div><div class="form-group"><label>Fecha Revisión</label><input type="date" id="edit-obs-revision-${o.id}" value="${o.proximaRevision}"></div><button class="btn btn-success btn-sm" onclick="saveObs('${sid}','${o.id}')">Guardar</button><button class="btn btn-sm" onclick="showSiniestroModal('${sid}')">Cancelar</button>`; }
function saveObs(sid,oid){ const s=siniestrosData.find(x=>x.id===sid),o=s.observaciones.find(k=>k.id===oid); o.texto=document.getElementById(`edit-obs-text-${o.id}`).value;o.textoPrivado=document.getElementById(`edit-obs-private-${o.id}`).value;o.proximaRevision=document.getElementById(`edit-obs-revision-${o.id}`).value; updateSiniestroNextRevision(s);saveData();renderAll();showSiniestroModal(sid); }
function deleteObs(sid,oid){ if(!confirm('¿Eliminar tarea?'))return; const s=siniestrosData.find(x=>x.id===sid); s.observaciones=s.observaciones.filter(o=>o.id!==oid); updateSiniestroNextRevision(s);saveData();renderAll();showSiniestroModal(sid); }
function addVencimiento(e,sid){ e.preventDefault(); const s=siniestrosData.find(x=>x.id===sid); const newVencimiento={id:generateId({}),fecha:document.getElementById('newVencimientoDate').value,texto:document.getElementById('newVencimientoText').value,completed:false,avisoPrevio:document.getElementById('newVencimientoAvisoPrevio').value}; s.vencimientos_list.push(newVencimiento); saveData(); addEventToGoogleCalendar(s,newVencimiento,'Vencimiento'); renderAll(); showSiniestroModal(sid); }

function editField(sid,field,element){ 
    if(editingField)return; 
    editingSiniestroId=sid; 
    editingField=field; 
    const s=siniestrosData.find(x=>x.id===sid),currentValue=s[field]||''; 
    let inputType='text'; 
    
    if(field==='cobradoCliente'||field==='cobradoEstudio'||field==='genero'||field==='estado')inputType='select'; 
    else if(/presupuesto|indemnizacion|honorarios|dni|celular|conductorDni|anoCliente|anoTercero|telefonoTercero|honorariosPorcentaje|productorPorcentaje|productorImporte|cuotaLitisPorcentaje/.test(field))inputType='number'; 
    else if(field==='fechaNacimiento'||field==='fechaCreacion'||field.includes('fecha'))inputType='date'; 
    else if(field==='horaSiniestro')inputType='time'; 
    else if(/mail/.test(field))inputType='email'; 
    
    const input=document.createElement(inputType==='select'?'select':'input'); 
    
    if(inputType==='select'){
        if(field==='cobradoCliente'||field==='cobradoEstudio') {
            ['Sí','No'].forEach(opt=>{const o=document.createElement('option');o.value=o.textContent=opt;if(opt===currentValue)o.selected=true;input.appendChild(o);});
        } else if (field === 'genero') {
            [{v:'Masculino',t:'Sr. (Masculino)'},{v:'Femenino',t:'Sra. (Femenino)'},{v:'Otro',t:'Otro'}].forEach(opt=>{
                const o=document.createElement('option');o.value=opt.v;o.textContent=opt.t;if(opt.v===currentValue)o.selected=true;input.appendChild(o);
            });
        } else if (field === 'estado') {
            [
                {v:'SIN INICIAR',t:'Sin Iniciar'},
                {v:'EJECUCION',t:'Ejecución'},
                {v:'MEDIACIONES',t:'Mediaciones'},
                {v:'DEMORADA',t:'Demorada'},
                {v:'FINALIZADA P',t:'Finalizada P'},
                {v:'FINALIZADA',t:'Finalizada'},
                {v:'RECHAZADO',t:'Rechazado'}
            ].forEach(opt=>{
                const o=document.createElement('option');o.value=opt.v;o.textContent=opt.t;if(opt.v===currentValue)o.selected=true;input.appendChild(o);
            });
        }
    } else {
        input.type=inputType;
        input.value=currentValue;
    } 
    
    if (field === 'honorariosPorcentaje' || field === 'productorPorcentaje' || field === 'cuotaLitisPorcentaje') {
        input.min = "0"; input.max = "100"; input.step = "0.01";
    } else if (/presupuesto|indemnizacion|honorarios|productorImporte/.test(field)) {
        input.step = "0.01";
    }

    input.style.cssText='width:100%;font-size:0.85em;border:1px solid #667eea;padding:2px;'; 
    if(field==='aseguradoEn')input.setAttribute('list','aseguradorasList'); 
    if(field==='contra')input.setAttribute('list','contrasList'); 
    if(/marca/.test(field))input.setAttribute('list','marcasVehiculosList'); 
    
    const save = () => {
        const s = siniestrosData.find(x => x.id === editingSiniestroId);
        if (!s) return;

        const fieldToSave = editingField;
        const newValue = input.value;
        s[fieldToSave] = newValue; 

        const indemnizacion = parseFloat(s.indemnizacion) || 0;

        if (fieldToSave === 'honorariosPorcentaje') {
            const porcentaje = parseFloat(newValue) || 0;
            s.honorarios = (indemnizacion * porcentaje / 100).toFixed(2);
        } else if (fieldToSave === 'productorPorcentaje') {
            const porcentaje = parseFloat(newValue) || 0;
            s.productorImporte = (indemnizacion * porcentaje / 100).toFixed(2);
        } else if (fieldToSave === 'indemnizacion') {
            const honorariosPorc = parseFloat(s.honorariosPorcentaje) || 0;
            const productorPorc = parseFloat(s.productorPorcentaje) || 0;
            
            if (honorariosPorc > 0) {
                s.honorarios = (indemnizacion * honorariosPorc / 100).toFixed(2);
            }
            if (productorPorc > 0) {
                s.productorImporte = (indemnizacion * productorPorc / 100).toFixed(2);
            }
        }

        saveData();
        // Si cambió el estado o los honorarios, actualizar en planilla de abonos
        if (fieldToSave === 'estado' || fieldToSave === 'honorarios' || fieldToSave === 'honorariosPorcentaje') {
            actualizarAbonosDesdeSiniestro(s);
        }
        editingSiniestroId = null;
        editingField = null;
        showSiniestroModal(sid); 
    };
    
    input.addEventListener('blur',save);
    input.addEventListener('keypress',e=>{if(e.key==='Enter'){e.preventDefault();input.blur();}}); 
    
    element.innerHTML='';
    element.appendChild(input);
    input.focus();
    const valLength=input.value.length;
    input.setSelectionRange(valLength,valLength); 
}

function onCompaniaSelectChange(sid, selectId, otrosId, field, otrosField) {
    const sel = document.getElementById(selectId);
    const otros = document.getElementById(otrosId);
    if (!sel || !otros) return;
    if (sel.value === 'OTRAS') {
        otros.style.display = 'block';
        otros.focus();
    } else {
        otros.style.display = 'none';
        const s = siniestrosData.find(x => x.id === sid);
        if (s) {
            s[field || 'contra'] = sel.value;
            s[otrosField || 'contraOtros'] = '';
            saveData();
            showSiniestroModal(sid);
        }
    }
}

function saveCompaniaOtros(sid, selectId, otrosId, field, otrosField) {
    const otros = document.getElementById(otrosId);
    const s = siniestrosData.find(x => x.id === sid);
    if (s && otros && otros.value.trim()) {
        s[field || 'contra'] = 'OTRAS';
        s[otrosField || 'contraOtros'] = otros.value.trim();
        if (!COMPANIAS_SEGUROS.slice(0,-1).includes(otros.value.trim())) {
            COMPANIAS_SEGUROS.splice(COMPANIAS_SEGUROS.length - 1, 0, otros.value.trim());
        }
        saveData();
        showSiniestroModal(sid);
    }
}

function saveTipoGestion(sid, valor) {
    const s = siniestrosData.find(x => x.id === sid);
    if (!s) return;
    s.tipoGestion = valor;
    saveData();
    showSiniestroModal(sid);
}

function onMarcaSelectChange(sid, field, otrosField, selectId, otrosId) {
    const sel = document.getElementById(selectId);
    const otros = document.getElementById(otrosId);
    if (!sel || !otros) return;
    if (sel.value === 'OTRAS') {
        otros.style.display = 'block';
        otros.focus();
    } else {
        otros.style.display = 'none';
        const s = siniestrosData.find(x => x.id === sid);
        if (s) { s[field] = sel.value; s[otrosField] = ''; saveData(); }
    }
}

function saveMarcaOtros(sid, field, otrosField, selectId, otrosId) {
    const otros = document.getElementById(otrosId);
    const s = siniestrosData.find(x => x.id === sid);
    if (s && otros) { s[field] = otros.value; s[otrosField] = otros.value; saveData(); }
}

function aplicarHonorarioSugerido(sid, porcentaje) {
    const s = siniestrosData.find(x => x.id === sid);
    if (!s) return;
    s.honorariosPorcentaje = porcentaje;
    const indem = parseFloat(s.indemnizacion) || 0;
    if (indem > 0) s.honorarios = (indem * porcentaje / 100).toFixed(2);
    saveData();
    renderAll();
    showSiniestroModal(sid);
}

function deleteSiniestro(id){ 
    if(!confirm('¿Eliminar siniestro y todo su historial?'))return; 
    siniestrosData=siniestrosData.filter(s=>s.id!==id); 
    saveData(); 
    renderAll(); 
    closeModal('siniestroInfoModal');
    // Borrar abono correspondiente en Firebase
    borrarAbonosDeSiniestro(id);
}

function borrarAbonosDeSiniestro(siniestroId) {
    if (typeof firebase === 'undefined' || !firebase.apps.length) return;
    try {
        const db = firebase.database();
        const abonosRef = db.ref('planilla_abonos');
        abonosRef.transaction(abonos => {
            if (!Array.isArray(abonos)) return abonos;
            return abonos.filter(a => a && a.siniestroId !== siniestroId);
        }).then(() => {
            updateDataStatus('✅ Abono eliminado de Planilla de Abonos.');
        }).catch(err => {
            console.error('Error al borrar abono:', err);
        });
    } catch(e) {
        console.error('Error en borrarAbonosDeSiniestro:', e);
    }
}

async function processConvenioData(event, siniestroId) {
    event.preventDefault();
    const s = siniestrosData.find(x => x.id === siniestroId); 
    if (!s) { alert("Error: Siniestro no encontrado."); return; }

    const data = {
        siniestro: s, 
        clienteNombre: document.getElementById('convClienteNombre').value,
        clienteDNI: document.getElementById('convClienteDNI').value,
        clienteDomicilio: document.getElementById('convClienteDomicilio').value,
        
        fechaSiniestro: document.getElementById('convFechaSiniestro').value,
        lugarSiniestro: document.getElementById('convLugarSiniestro').value,
        vehiculoTercero: document.getElementById('convVehiculoTercero').value,
        aseguradoraTercero: document.getElementById('convAseguradoraTercero').value,
        
        lugarFirma: document.getElementById('convLugarFirma').value,
        cuotaLitisPorcentaje: document.getElementById('convCuotaLitis').value,
        tipoDanos: document.getElementById('convTipoDanos').value,
        
        fechaFirma: new Date().toISOString().split('T')[0] 
    };

    const modalContent = document.getElementById('convenioGenerationModal').querySelector('.modal-content'); 
    modalContent.innerHTML = `<h2 style="text-align:center;margin-bottom:20px;">🧠 Redactando Convenio...</h2><p id="progress-text" style="text-align:center;margin-bottom:10px;font-style:italic;color:#555;">Iniciando proceso...</p><div class="progress-bar-container"><div id="progressBar" class="progress-bar"></div></div>`; 
    
    const progressBar = document.getElementById('progressBar'); 
    const progressText = document.getElementById('progress-text'); 
    let width = 0; 
    const interval = setInterval(() => { width += 5; if (width >= 95) return; progressBar.style.width = width + '%'; if (width > 40) progressText.textContent = "Aplicando formato legal..."; }, 150); 

    const result = await callAIApi(data, '/api/generar-convenio'); 
    
    clearInterval(interval); 
    progressBar.style.width = '100%'; 
    let resultHTML; 

    if (result.success) { 
        progressText.textContent = "¡Generado con éxito!"; 
        resultHTML = `
            <div class="print-area">
                <span class="close no-print" onclick="closeModal('convenioGenerationModal')">&times;</span>
                <h2 style="margin-bottom:14px;">✅ Convenio Generado</h2>
                <textarea id="generatedConvenioText" readonly style="width:100%;height:45vh;font-family:monospace;font-size:0.9em;padding:10px;border:1px solid #ccc;border-radius:8px;">${result.letter}</textarea>
            </div>
            <div class="action-buttons no-print" style="margin-top:15px;">
                <button class="btn btn-info" onclick="copyToClipboard('generatedConvenioText')">📋 Copiar Texto</button>
                <button class="btn" onclick="window.print()">🖨️ Imprimir</button>
                <button class="btn btn-danger" onclick="downloadAsPDFConvenio()">📄 Descargar PDF</button>
                <button class="btn btn-success" onclick="downloadAsWordConvenio()">📄 Descargar Word</button>
            </div>`; 
    } else { 
        progressText.textContent = "Error en la generación"; 
        resultHTML = `
            <span class="close no-print" onclick="closeModal('convenioGenerationModal')">&times;</span>
            <h2 style="color:var(--danger-color);text-align:center;">❌ Ocurrió un Error</h2>
            <p style="margin-top:15px;font-size:1em;text-align:center;">No se pudo generar el convenio. Motivo:</p>
            <textarea readonly style="width:100%;height:200px;margin-top:10px;background-color:#f3f3f3;border:1px solid #ccc;padding:10px;font-family:monospace;">${result.error}</textarea>
            <div class="action-buttons no-print" style="margin-top:15px;">
                <button class="btn btn-warning" onclick="closeModal('convenioGenerationModal')">Cerrar</button>
            </div>`; 
    } 
    modalContent.innerHTML = resultHTML;
}

async function callAIApi(data, apiPath){ 
    console.log("Generando con Cloudflare Workers:", apiPath);

    const API_URL = 'https://garcia-ia.garciayasociadosjus.workers.dev' + apiPath;

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 60000);

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data),
            signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (!response.ok) {
            const errText = await response.text();
            throw new Error('Error del servidor: ' + response.status + ' - ' + errText);
        }

        const generatedLetter = await response.text();
        return {success: true, letter: generatedLetter};

    } catch (error) {
        clearTimeout(timeoutId);
        console.error("Error:", error);
        let errorMessage = 'ERROR: No se pudo generar el documento.';
        if (error.name === 'AbortError') {
            errorMessage = 'ERROR: La solicitud tardó demasiado. Intenta de nuevo.';
        } else {
            errorMessage += '\n\nDetalles: ' + error.message;
        }
        return {success: false, error: errorMessage};
    }
}
